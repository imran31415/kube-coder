# Assistant secrets template
# Copy to secrets/<user>/assistant.yaml (gitignored) and apply with:
#   helm upgrade ws-<user> charts/workspace \
#     -f deployments/<user>/values.yaml \
#     -f secrets/<user>/assistant.yaml
#
# Each block is independent. Filling either one (or both) lights up an
# extra entry in the dashboard's New Task assistant selector. Claude Code
# is always available regardless, so this file is purely additive.

# assistant:
#   # OpenCode via OpenRouter
#   openrouter:
#     apiKey: "sk-or-v1-..."             # https://openrouter.ai/keys
#     model: "anthropic/claude-sonnet-4"
#
#   # OpenCode via DeepSeek (first-class provider — auto-discovers key)
#   deepseek:
#     apiKey: "sk-..."                   # https://platform.deepseek.com/api-keys
#     model: "deepseek-chat"
#
#   # OpenCode via a custom OpenAI-compatible endpoint
#   # (e.g. a private proxy on your own droplet)
#   fallback:
#     baseUrl: "https://llm.your-droplet.example/v1"
#     apiKey: "optional-bearer-token"    # leave "" if your proxy is open
#     model: "anthropic/claude-sonnet-4"
#     providerId: "kube-coder-fallback"
#     providerName: "Kube-Coder Fallback"
#
# Claude API key (separate file, gitignored): secrets/<user>/claude.yaml
#   claude:
#     apiKey: "sk-ant-..."
