{{- if .Values.ssh.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssh-server-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
data:
  sshd_config: |
    # Workspace sshd. Runs in the ssh-server sidecar (root), accepts pubkey
    # logins as the `ubuntu` user (UID 1000) — matches the main ide
    # container's UID so files created via SSH have consistent ownership
    # on the shared home PVC.
    Port {{ .Values.ssh.port }}
    HostKey /home/dev/.ssh-host-keys/ssh_host_ed25519_key
    HostKey /home/dev/.ssh-host-keys/ssh_host_rsa_key
    PidFile /run/sshd.pid
    LogLevel INFO

    PasswordAuthentication no
    PubkeyAuthentication yes
    PermitRootLogin no
    AllowUsers ubuntu
    AuthorizedKeysFile /etc/ssh/authorized_keys.d/%u

    # Persist host keys + read root-owned authorized_keys file from /etc/ssh
    # (mounted from Secret). StrictModes off because the home directory is
    # PVC-shared and may have group-writable bits set by the ide container.
    StrictModes no
    UsePAM no
    PrintMotd no
    AcceptEnv LANG LC_*
    Subsystem sftp /usr/lib/openssh/sftp-server
  entrypoint.sh: |
    #!/bin/bash
    # ssh-server sidecar entrypoint. Generates host keys on first run
    # (persisted on the home PVC so client fingerprints don't change
    # across pod restarts), prepares the authorized_keys layout from the
    # mounted Secret, then runs sshd in the foreground.
    set -e

    mkdir -p /home/dev/.ssh-host-keys
    chmod 700 /home/dev/.ssh-host-keys
    [ -f /home/dev/.ssh-host-keys/ssh_host_ed25519_key ] \
      || ssh-keygen -t ed25519 -N "" -f /home/dev/.ssh-host-keys/ssh_host_ed25519_key
    [ -f /home/dev/.ssh-host-keys/ssh_host_rsa_key ] \
      || ssh-keygen -t rsa -b 4096 -N "" -f /home/dev/.ssh-host-keys/ssh_host_rsa_key
    # Pod fsGroup=1000 sets files to 0660 on the PVC; sshd refuses any
    # private key readable by group/other. Tighten to 0600 explicitly.
    chmod 0600 /home/dev/.ssh-host-keys/ssh_host_*_key
    chmod 0644 /home/dev/.ssh-host-keys/ssh_host_*_key.pub

    # Materialize authorized_keys for the ubuntu user. The Secret is mounted
    # read-only at /etc/ssh/authorized_keys.secret; copy under AuthorizedKeysFile
    # path so sshd can read with its own permissions.
    mkdir -p /etc/ssh/authorized_keys.d
    cp /etc/ssh/authorized_keys.secret/authorized_keys /etc/ssh/authorized_keys.d/ubuntu
    chmod 0644 /etc/ssh/authorized_keys.d/ubuntu

    # sshd refuses to start without /run/sshd for privilege separation.
    mkdir -p /run/sshd
    chmod 0755 /run/sshd

    # The ubuntu user ships with a locked password ('!' in /etc/shadow);
    # sshd refuses to authenticate locked accounts even via pubkey. Set
    # the hash to '*' so password login remains impossible but pubkey
    # auth is permitted.
    usermod -p '*' ubuntu

    # Mirror the ide container's credential layout into THIS container's
    # /home/ubuntu so SSH sessions see PVC-backed ~/.gitconfig, ~/.ssh,
    # and ~/.config/gh. Without this, gh tokens, git config, and
    # known_hosts written via SSH would be lost on every pod restart
    # (sidecar /home/ubuntu is ephemeral; only /home/dev persists).
    mkdir -p /home/dev/.credentials/.ssh \
             /home/dev/.credentials/.config/git \
             /home/dev/.credentials/.config/gh
    chmod 700 /home/dev/.credentials/.ssh
    touch /home/dev/.credentials/.config/git/config

    mkdir -p /home/ubuntu/.config
    ln -sfn /home/dev/.credentials/.ssh         /home/ubuntu/.ssh
    ln -sf  /home/dev/.credentials/.config/git/config /home/ubuntu/.gitconfig
    ln -sfn /home/dev/.credentials/.config/gh   /home/ubuntu/.config/gh
    chown -h ubuntu:ubuntu /home/ubuntu/.ssh /home/ubuntu/.gitconfig /home/ubuntu/.config/gh /home/ubuntu/.config 2>/dev/null || true

    # Extend the same PVC-backed layout to other per-tool logins (issue #243)
    # so Expo/npm/Docker/AWS/gcloud auth persists across restarts for SSH
    # sessions too (kept in sync with the ide container's start.sh).
    mkdir -p /home/dev/.credentials/.expo \
             /home/dev/.credentials/.docker \
             /home/dev/.credentials/.aws \
             /home/dev/.credentials/.config/gcloud \
             /home/dev/.credentials/.config/.wrangler
    chmod 700 /home/dev/.credentials/.expo /home/dev/.credentials/.docker \
              /home/dev/.credentials/.aws /home/dev/.credentials/.config/gcloud \
              /home/dev/.credentials/.config/.wrangler
    touch /home/dev/.credentials/.npmrc /home/dev/.credentials/.git-credentials
    chmod 600 /home/dev/.credentials/.npmrc /home/dev/.credentials/.git-credentials
    ln -sfn /home/dev/.credentials/.expo           /home/ubuntu/.expo
    ln -sfn /home/dev/.credentials/.docker         /home/ubuntu/.docker
    ln -sfn /home/dev/.credentials/.aws            /home/ubuntu/.aws
    ln -sfn /home/dev/.credentials/.config/gcloud  /home/ubuntu/.config/gcloud
    ln -sfn /home/dev/.credentials/.config/.wrangler /home/ubuntu/.config/.wrangler
    ln -sf  /home/dev/.credentials/.npmrc           /home/ubuntu/.npmrc
    ln -sf  /home/dev/.credentials/.git-credentials /home/ubuntu/.git-credentials
    chown -h ubuntu:ubuntu /home/ubuntu/.expo /home/ubuntu/.docker /home/ubuntu/.aws \
            /home/ubuntu/.config/gcloud /home/ubuntu/.config/.wrangler \
            /home/ubuntu/.npmrc /home/ubuntu/.git-credentials 2>/dev/null || true

    # Put user-installed tools on the PVC (/home/dev/.local/bin) on PATH for
    # SSH sessions too (issue #334; kept in sync with the ide container's
    # start.sh bootstrap_rc). This sidecar has its OWN ephemeral /home/ubuntu,
    # so the rc files must be re-seeded here on every restart. Absolute paths
    # only — $HOME is /home/ubuntu and is wiped on restart.
    for rc in /home/ubuntu/.profile /home/ubuntu/.bashrc; do
      touch "$rc"
      grep -qF '/home/dev/.local/bin' "$rc" || cat >> "$rc" <<'PATHRC'

    # --- kube-coder: user-installed tools on the PVC (issue #334) ---
    [ -d /home/dev/.local/bin ] && case ":$PATH:" in
      *":/home/dev/.local/bin:"*) ;;
      *) export PATH="/home/dev/.local/bin:$PATH" ;;
    esac
    PATHRC
      chown ubuntu:ubuntu "$rc" 2>/dev/null || true
    done

    # When a GitHub App is configured, the ide container's token-refresh
    # daemon writes a fresh GITHUB_TOKEN to /home/dev/.profile.d-github-env
    # every ~hour. Source it from /etc/profile.d so SSH login shells
    # automatically inherit the token (otherwise gh/git over HTTPS don't
    # see it — that env block in deployment.yaml only injects into the
    # ide container, not this sidecar).
    cat > /etc/profile.d/github-app.sh <<'PROFILE'
    # shellcheck disable=SC1091
    [ -f /home/dev/.profile.d-github-env ] && . /home/dev/.profile.d-github-env
    PROFILE
    chmod 0644 /etc/profile.d/github-app.sh

    exec /usr/sbin/sshd -D -e -f /etc/ssh/sshd_config_kube-coder
{{- end }}
