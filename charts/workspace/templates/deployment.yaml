apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
  labels: 
    app: ws-{{ .Values.user.name }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector: 
    matchLabels: 
      app: ws-{{ .Values.user.name }}
  template:
    metadata:
      labels:
        app: ws-{{ .Values.user.name }}
        {{- if .Values.update.selfServeSecretName }}
        # Lets the controller's NetworkPolicy admit this pod to its token-gated
        # self-serve port (8081) for version self-updates. Only applied when
        # self-serve is enabled, so it grants no reachability otherwise.
        kube-coder.dev/component: workspace
        {{- end }}
      annotations:
        checksum/browser-config: {{ include (print $.Template.BasePath "/browser-configmap.yaml") . | sha256sum }}
        checksum/claude-config: {{ include (print $.Template.BasePath "/claude-configmap.yaml") . | sha256sum }}
        checksum/terminal-entry: {{ include (print $.Template.BasePath "/terminal-entry-configmap.yaml") . | sha256sum }}
        checksum/workspace-entrypoint: {{ include (print $.Template.BasePath "/workspace-entrypoint-configmap.yaml") . | sha256sum }}
        {{- if or .Values.assistant.openrouter.apiKey .Values.assistant.deepseek.apiKey .Values.assistant.fallback.baseUrl }}
        checksum/assistant-secret: {{ include (print $.Template.BasePath "/assistant-secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.github.app.appId }}
        checksum/github-app-script: {{ include (print $.Template.BasePath "/github-app-token-refresh.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.ssh.enabled }}
        checksum/ssh-server: {{ include (print $.Template.BasePath "/ssh-server-configmap.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: ws-{{ .Values.user.name }}
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
      - name: {{ .Values.image.pullSecretName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: ide
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        workingDir: /home/dev
        command: ["/bin/bash", "-l", "/workspace-entrypoint/start.sh"]
        env:
        # Make non-interactive bash (e.g. `bash -c …`, hooks, the gh/git
        # credential helper) source the GH_TOKEN/GITHUB_TOKEN export. Points
        # at the user-writable file the token daemon rewrites in place — the
        # container runs with allowPrivilegeEscalation:false, so /etc/* cannot
        # be written and a /etc path here would dangle. Bash ignores BASH_ENV
        # when the file doesn't exist yet, so it is safe to set unconditionally
        # — the entrypoint creates the file after first mint.
        - name: BASH_ENV
          value: /home/dev/.profile.d-github-env
        {{- if eq .Values.build.mode "buildkit" }}
        - name: DOCKER_HOST
          value: "tcp://localhost:2376"
        - name: DOCKER_CERT_PATH
          value: "/certs/client"
        - name: DOCKER_TLS_VERIFY
          value: "1"
        {{- end }}
        {{- with .Values.user.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        # Authoritative workspace identity for self-serve update / cron brokering.
        # Avoids parsing the pod hostname, whose two hash suffixes (ReplicaSet +
        # pod) a regex strips incorrectly.
        - name: WORKSPACE_USER
          value: {{ .Values.user.name | quote }}
        {{- if .Values.claude.apiKey }}
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: claude-secrets-{{ .Values.user.name }}
              key: anthropic-api-key
        {{- end }}
        {{- if or .Values.assistant.openrouter.apiKey .Values.assistant.openrouter.sharedSecretName }}
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              {{- if .Values.assistant.openrouter.apiKey }}
              name: assistant-secrets-{{ .Values.user.name }}
              {{- else }}
              # Shared OpenRouter key for all workspaces — a per-user
              # assistant.openrouter.apiKey (above) takes precedence when set.
              name: {{ .Values.assistant.openrouter.sharedSecretName }}
              {{- end }}
              key: openrouter-api-key
        - name: KC_OPENROUTER_MODEL
          value: {{ .Values.assistant.openrouter.model | quote }}
        {{- end }}
        {{- if .Values.assistant.deepseek.apiKey }}
        - name: DEEPSEEK_API_KEY
          valueFrom:
            secretKeyRef:
              name: assistant-secrets-{{ .Values.user.name }}
              key: deepseek-api-key
        - name: KC_DEEPSEEK_MODEL
          value: {{ .Values.assistant.deepseek.model | quote }}
        {{- end }}
        {{- if (.Values.assistant.antigravity).model }}
        - name: KC_ANTIGRAVITY_MODEL
          value: {{ .Values.assistant.antigravity.model | quote }}
        {{- end }}
        {{- if (.Values.assistant.librefang).agent }}
        - name: KC_LIBREFANG_AGENT
          value: {{ .Values.assistant.librefang.agent | quote }}
        {{- end }}
        {{- if .Values.assistant.fallback.baseUrl }}
        - name: KC_FALLBACK_BASE_URL
          valueFrom:
            secretKeyRef:
              name: assistant-secrets-{{ .Values.user.name }}
              key: fallback-base-url
        - name: KC_FALLBACK_API_KEY
          valueFrom:
            secretKeyRef:
              name: assistant-secrets-{{ .Values.user.name }}
              key: fallback-api-key
        - name: KC_FALLBACK_MODEL
          value: {{ .Values.assistant.fallback.model | quote }}
        - name: KC_FALLBACK_PROVIDER_ID
          value: {{ .Values.assistant.fallback.providerId | quote }}
        - name: KC_FALLBACK_PROVIDER_NAME
          value: {{ .Values.assistant.fallback.providerName | quote }}
        {{- end }}
        {{- /* Phase-2 semantic-memory embeddings (#90). Only emitted when a
               provider is configured; the key is referenced from a Secret. */}}
        {{- if ne (.Values.memory.embeddings.provider | default "none") "none" }}
        - name: KC_EMBED_PROVIDER
          value: {{ .Values.memory.embeddings.provider | quote }}
        {{- with .Values.memory.embeddings.model }}
        - name: KC_EMBED_MODEL
          value: {{ . | quote }}
        {{- end }}
        {{- with .Values.memory.embeddings.dim }}
        - name: KC_EMBED_DIM
          value: {{ . | quote }}
        {{- end }}
        {{- if or .Values.memory.embeddings.apiKey .Values.memory.embeddings.existingSecretName }}
        - name: {{ if eq .Values.memory.embeddings.provider "openai" }}OPENAI_API_KEY{{ else }}VOYAGE_API_KEY{{ end }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.memory.embeddings.existingSecretName | default (printf "memory-secrets-%s" .Values.user.name) }}
              key: embedding-api-key
        {{- end }}
        {{- with .Values.memory.embeddings.baseUrl }}
        - name: KC_OPENAI_BASE_URL
          value: {{ . | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.github.app.appId }}
        - name: GITHUB_APP_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.github.app.existingSecretName | default (printf "github-app-secrets-%s" .Values.user.name) }}
              key: app-id
        - name: GITHUB_APP_INSTALLATION_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.github.app.existingSecretName | default (printf "github-app-secrets-%s" .Values.user.name) }}
              key: installation-id
        - name: GITHUB_APP_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.github.app.existingSecretName | default (printf "github-app-secrets-%s" .Values.user.name) }}
              key: private-key
        {{- end }}
        # Read-only public demo gate. server.py reads READONLY_MODE at the
        # request layer and refuses every POST/DELETE/PUT with 403. AUTH_MODE
        # tells server.py to short-circuit check_claude_auth when the ingress
        # itself is unauthed. server.py refuses to start if AUTH_MODE=none
        # without READONLY_MODE=true (no unauthed writes, ever).
        - name: READONLY_MODE
          value: {{ .Values.readOnly | default false | quote }}
        - name: AUTH_MODE
          value: {{ .Values.ingress.auth.type | default "basic" | quote }}
        # Hypervisor — the workspace-aware chat tab. A clean chat UI over the
        # user's existing CLI agents (claude/ante/opencode/…) plus the dashboard
        # MCP tools. These just flag the feature + its default agent/workdir;
        # provider/model/keys come from the existing assistant.* config above.
        - name: HYPERVISOR_ENABLED
          value: {{ (.Values.hypervisor).enabled | default true | quote }}
        - name: HYPERVISOR_DEFAULT_ASSISTANT
          value: {{ (.Values.hypervisor).defaultAssistant | default "claude" | quote }}
        - name: HYPERVISOR_WORKDIR
          value: {{ (.Values.hypervisor).workdir | default "/home/dev" | quote }}
        {{- if .Values.update.selfServeSecretName }}
        # Self-serve version updates: the workspace backend brokers to the
        # controller's token-gated self-serve listener over the in-cluster
        # Service. The URL defaults to the controller Service on its self-serve
        # port; the token comes from the shared Secret named in values.
        - name: CONTROLLER_SELF_SERVE_URL
          value: {{ .Values.update.controllerUrl | default (printf "http://workspace-controller.%s.svc.cluster.local:8081" (.Values.update.controllerNamespace | default "coder")) | quote }}
        - name: CONTROLLER_SELF_SERVE_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.update.selfServeSecretName }}
              key: self-serve-token
        {{- end }}
        # DEMO_SHOW_ALL=true makes the SPA render mutation UI (dimmed +
        # click-intercepted) instead of hiding it, so the public demo shows
        # the full surface. Server still 403s every write. Presentation-only;
        # only set on the read-only demo deploy.
        - name: DEMO_SHOW_ALL
          value: {{ .Values.demoShowAll | default false | quote }}
        # Public-demo confidentiality (finding 3). In AUTH_MODE=none server.py
        # already refuses hidden (dot) path segments for direct file reads so
        # dotfile credentials (.claude-tasks/.api-token, .config, .ssh, .git)
        # aren't publicly downloadable. PUBLIC_FILE_ROOT further confines public
        # reads to a subdir of /home/dev; PUBLIC_DEMO_ACK acknowledges that
        # readable PVC files are public (silences the loud startup warning).
        # Operators MUST serve a public demo from a fresh, sanitized PVC.
        {{- if (.Values.publicDemo).fileRoot }}
        - name: PUBLIC_FILE_ROOT
          value: {{ (.Values.publicDemo).fileRoot | quote }}
        {{- end }}
        - name: PUBLIC_DEMO_ACK
          value: {{ (.Values.publicDemo).acknowledged | default false | quote }}
        # kube-coder environment marker — always set so anything running in
        # the workspace (dev servers, build scripts, the user's own app) can
        # detect it's inside a kube-coder pod. KUBE_CODER is visible to every
        # process; EXPO_PUBLIC_KUBE_CODER is the Expo-public alias that gets
        # inlined into the web bundle (Expo only exposes EXPO_PUBLIC_* to
        # client code). Frontend check: `if (process.env.EXPO_PUBLIC_KUBE_CODER)`.
        - name: KUBE_CODER
          value: "1"
        - name: EXPO_PUBLIC_KUBE_CODER
          value: "1"
        ports:
        - name: http
          containerPort: 8080
        - name: terminal
          containerPort: 7681
        - name: browser
          containerPort: 6080
        - name: vnc
          containerPort: 6081
        readinessProbe:
          httpGet:
            path: /health
            port: 6080
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          # Liveness hits the cheap /livez (no sub-service socket connects, no
          # auth) — restarting this pod destroys the user's live tmux + tasks,
          # so the probe must only catch a truly wedged process, not a busy
          # one. failureThreshold 6 x period 30s => ~3 min of sustained
          # unresponsiveness before a restart. Readiness (below) keeps the
          # richer /health check so a degraded sub-service still drops the pod
          # from Service endpoints without killing it.
          httpGet:
            path: /livez
            port: 6080
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 6
        volumeMounts:
        - name: home
          mountPath: /home/dev
        - name: browser-config
          mountPath: /browser-config
        - name: browser-html
          mountPath: /browser-html
        - name: claude-config
          mountPath: /claude-config
        - name: terminal-scripts
          mountPath: /terminal-scripts
        - name: workspace-entrypoint
          mountPath: /workspace-entrypoint
        {{- if .Values.github.app.appId }}
        - name: github-app-script
          mountPath: /github-app
        {{- end }}
        {{- if eq .Values.build.mode "buildkit" }}
        - name: docker-certs
          mountPath: /certs/client
          readOnly: true
        {{- end }}
        - name: kaniko-wrapper
          mountPath: /usr/local/bin/docker-build
          subPath: docker-build
        {{- if eq .Values.build.mode "buildkit" }}
        - name: buildkit-wrapper
          mountPath: /usr/local/bin/docker-buildx
          subPath: docker-buildx
        {{- end }}
        resources:
{{ toYaml .Values.resources | indent 10 }}
        # Container-level hardening for the user's IDE/desktop process. The
        # pod-level securityContext already pins UID/GID 1000; this block
        # additionally blocks privilege escalation, drops all Linux
        # capabilities (none of code-server / ttyd / Xvfb / x11vnc /
        # websockify / fluxbox / Claude / Playwright need any), and pins
        # the runtime's default seccomp profile.
        #
        # Playwright's Firefox sandbox falls back to unprivileged
        # user-namespaces on modern kernels (DOKS runs 6.1+); if a future
        # workload needs CAP_SYS_CHROOT or CAP_SYS_ADMIN, add it back
        # narrowly via `capabilities.add` rather than removing the drop.
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
      {{- if eq .Values.build.mode "buildkit" }}
      - name: dind
        image: docker:27-dind
        securityContext:
          # Pod-level securityContext sets runAsNonRoot:true (cc18d99 hardening
          # for the ide container). dind is the docker daemon — it MUST run
          # as root to manage /var/lib/docker, namespaces, cgroups, etc.
          # K8s admission rejects a runAsUser:0 container under a
          # runAsNonRoot:true pod unless the container explicitly overrides
          # with its own runAsNonRoot:false. Without this line, the dind
          # container fails with CreateContainerConfigError on every new
          # pod (existing pods survive until restart). See
          # charts/workspace/tests/deployment_test.yaml for the regression
          # guard.
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
        env:
        - name: DOCKER_TLS_CERTDIR
          value: "/certs"
        ports:
        - containerPort: 2376
          name: docker
        # Resource caps prevent a runaway `docker build` (fork bomb,
        # 10GB layer, etc.) from starving every other workspace on the
        # node. Override per-workspace via .Values.build.dindResources.
        # The dind daemon idles near-zero when no build is running, so its
        # CPU REQUEST (scheduler reservation) is small (50m) — it bursts to
        # the 2-core limit during a build. A large request just strands node
        # capacity (see the ide `resources` note in values.yaml).
        resources:
{{ toYaml (.Values.build.dindResources | default (dict "requests" (dict "cpu" "50m" "memory" "256Mi") "limits" (dict "cpu" "2" "memory" "4Gi"))) | indent 10 }}
        volumeMounts:
        - name: docker-certs
          mountPath: /certs/client
        - name: dind-storage
          mountPath: /var/lib/docker
        {{- end }}
      {{- if .Values.ssh.enabled }}
      - name: ssh-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          # Same override as the dind sidecar: sshd needs root to bind
          # privileged port 22 and exec into user shells, so it must opt
          # out of the pod-level runAsNonRoot:true.
          runAsNonRoot: false
          runAsUser: 0
          runAsGroup: 0
        command: ["/bin/bash", "/ssh-server-config/entrypoint.sh"]
        ports:
        - containerPort: {{ .Values.ssh.port }}
          name: ssh
        volumeMounts:
        - name: home
          mountPath: /home/dev
        - name: ssh-server-config
          mountPath: /ssh-server-config
        - name: ssh-server-config
          mountPath: /etc/ssh/sshd_config_kube-coder
          subPath: sshd_config
        - name: ssh-authorized-keys
          mountPath: /etc/ssh/authorized_keys.secret
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      {{- end }}
      volumes:
      - name: home
        persistentVolumeClaim:
          claimName: ws-{{ .Values.user.name }}-home
      - name: browser-config
        configMap:
          name: browser-config-{{ .Values.user.name }}
          defaultMode: 0755
      - name: browser-html
        configMap:
          name: browser-html-{{ .Values.user.name }}
          defaultMode: 0644
      - name: claude-config
        configMap:
          name: claude-config-{{ .Values.user.name }}
          defaultMode: 0444
      - name: terminal-scripts
        configMap:
          name: terminal-entry-{{ .Values.user.name }}
          defaultMode: 0555
      - name: workspace-entrypoint
        configMap:
          name: workspace-entrypoint-{{ .Values.user.name }}
          defaultMode: 0555
      {{- if .Values.github.app.appId }}
      - name: github-app-script
        configMap:
          name: github-app-script-{{ .Values.user.name }}
          defaultMode: 0555
      {{- end }}
      - name: kaniko-wrapper
        configMap:
          name: kaniko-wrapper
          defaultMode: 0555
      {{- if eq .Values.build.mode "buildkit" }}
      - name: buildkit-wrapper
        configMap:
          name: buildkit-wrapper
          defaultMode: 0555
      - name: docker-certs
        emptyDir: {}
      - name: dind-storage
        emptyDir: {}
      {{- end }}
      {{- if .Values.ssh.enabled }}
      - name: ssh-server-config
        configMap:
          name: ssh-server-{{ .Values.user.name }}
          defaultMode: 0555
      - name: ssh-authorized-keys
        secret:
          secretName: ssh-authorized-keys-{{ .Values.user.name }}
          defaultMode: 0444
      {{- end }}
