apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: ws-{{ .Values.user.name }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    {{- if eq .Values.ingress.auth.type "basic" }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ required "ingress.auth.secretName is required when ingress.auth.type=basic (an empty value here disables basic auth and exposes the workspace publicly)" .Values.ingress.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # nginx defaults to 1m, which 413s /api/files/upload bodies long before
    # server.py's MAX_UPLOAD_BYTES (200 MiB) check ever runs (issue #344).
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.ingress.bodySize | default "200m" | quote }}
    {{- if .Values.holdingPage.enabled }}
    # During a self-serve update the workspace pod is Recreate-restarted and
    # this upstream has no Ready endpoint for ~1 min. Serve the always-up
    # holding-<user> backend's "restarting…" page (issue #184) instead of a
    # raw nginx 503; it polls /health and returns to the live workspace once
    # the new pod is Ready. In basic-auth mode the auth sub-request runs first,
    # so the page is never exposed unauthenticated.
    nginx.ingress.kubernetes.io/custom-http-errors: "502,503,504"
    nginx.ingress.kubernetes.io/default-backend: holding-{{ .Values.user.name }}
    {{- end }}
    {{- if .Values.ingress.tls.enabled }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.user.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.user.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ws-{{ .Values.user.name }}
            port:
              number: 6080
      {{- if eq .Values.ingress.auth.type "basic" }}
      - path: /vscode
        pathType: Prefix
        backend:
          service:
            name: ws-{{ .Values.user.name }}
            port:
              number: 8080
      {{- end }}
{{- if eq .Values.ingress.auth.type "basic" }}
# /browser, /terminal, /vnc-direct, /websockify expose ttyd + VNC directly
# (websocket → keystrokes → shell), so these raw ingresses may only exist
# where an auth annotation actually protects them — i.e. basic mode.
#   - auth.type=none (public): skipped entirely; any visitor would get an
#     interactive terminal regardless of server.py's READONLY_MODE gate.
#   - auth.type=oauth2: skipped entirely; only the /oauth/* routes in
#     ingress-oauth2.yaml carry the auth-url/auth-signin annotations, so
#     rendering raw routes here would expose an UNAUTHENTICATED shell +
#     VNC next to the authenticated ones (the workspace NetworkPolicy
#     admits the ingress controller, so it happily proxies them).
# The dashboard SPA derives its base path from the deployment's auth mode
# (see web/src/api/client.ts authPrefix), so oauth2 users are routed to
# /oauth/terminal etc. and never hit these paths; public mode hides the
# entry points (Topbar.tsx / MoreSheet) so users won't see broken iframes.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-{{ .Values.user.name }}-browser
  namespace: {{ .Values.namespace }}
  labels:
    app: ws-{{ .Values.user.name }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    {{- if eq .Values.ingress.auth.type "basic" }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ required "ingress.auth.secretName is required when ingress.auth.type=basic (an empty value here disables basic auth and exposes the workspace publicly)" .Values.ingress.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.user.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.user.host }}
    http:
      paths:
      - path: /browser
        pathType: Prefix
        backend:
          service:
            name: ws-{{ .Values.user.name }}
            port:
              number: 6080
---
apiVersion: networking.k8s.io/v1
