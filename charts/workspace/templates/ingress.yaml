---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-{{ .Values.user.name }}-vnc
  namespace: {{ .Values.namespace }}
  labels:
    app: ws-{{ .Values.user.name }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    # Protect VNC HTML pages with basic auth
    {{- if eq .Values.ingress.auth.type "basic" }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ required "ingress.auth.secretName is required when ingress.auth.type=basic (an empty value here disables basic auth and exposes the workspace publicly)" .Values.ingress.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    {{- end }}
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    nginx.ingress.kubernetes.io/proxy-set-headers: "ingress-nginx/websocket-headers"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.user.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.user.host }}
    http:
      paths:
      - path: /vnc-direct/(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: ws-{{ .Values.user.name }}
            port:
              number: 6081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-{{ .Values.user.name }}-websocket
  namespace: {{ .Values.namespace }}
  labels:
    app: ws-{{ .Values.user.name }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    # websockify fronts x11vnc (-nopw): without ingress auth this WebSocket
    # hands out full VNC control of the desktop. Browsers replay cached
    # Basic credentials on same-origin WS upgrades, so noVNC keeps working
    # once the user has authenticated.
    {{- if eq .Values.ingress.auth.type "basic" }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ required "ingress.auth.secretName is required when ingress.auth.type=basic (an empty value here disables basic auth and exposes the workspace publicly)" .Values.ingress.auth.secretName }}
    nginx.ingress.kubernetes.io/auth-realm: "Authentication Required"
    {{- end }}
    nginx.ingress.kubernetes.io/proxy-set-headers: "ingress-nginx/websocket-headers"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.user.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.user.host }}
    http:
      paths:
      - path: /websockify
        pathType: Prefix
        backend:
          service:
            name: ws-{{ .Values.user.name }}
            port:
              number: 6081
{{- end }}