apiVersion: v1
kind: ConfigMap
metadata:
  name: terminal-entry-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
data:
  terminal-entry.sh: |
    #!/bin/bash
    # Cap Node heap to 2GB for claude CLI and any MCP child processes spawned
    # from this shell. Without this, long-running claude sessions can grow
    # past 2-3GB and combine with code-server to OOM the workspace cgroup.
    export NODE_OPTIONS="${NODE_OPTIONS:---max-old-space-size=2048}"
    PENDING_FILE="/tmp/.claude-terminal-pending"
    if [ -f "$PENDING_FILE" ]; then
        SESSION_NAME=$(cat "$PENDING_FILE")
        rm -f "$PENDING_FILE"
        if tmux has-session -t "$SESSION_NAME" 2>/dev/null; then
            exec tmux attach-session -t "$SESSION_NAME"
        fi
    fi
    exec bash -l
