apiVersion: v1
kind: ServiceAccount
metadata:
  name: ws-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
---
# Namespace-scoped: every kubectl call from the workspace targets its own
# namespace (CronManager reads /var/run/secrets/.../namespace and passes
# `-n $ns` explicitly). A ClusterRole would let a workspace user list pods /
# read logs / mutate Secrets cluster-wide, which on this shared DOKS cluster
# means cross-tenant exposure to ~20 unrelated apps.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ws-{{ .Values.user.name }}-build
  namespace: {{ .Values.namespace }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
# Secrets: `list` is intentionally omitted — it's the bulk-enumeration
# verb that lets one workspace pod walk every other tenant's secret in
# the shared `coder` namespace. With `list` dropped an attacker must
# already know the exact name of a secret to read it.
#
# `create` cannot be restricted by resourceName (Kubernetes doesn't know
# the object name at authorization time), so this Role still allows
# create of any Secret in the namespace. The real fix is per-workspace
# namespaces — track at github.com/imran31415/kube-coder/issues. Until
# then this is the tightest scoping the shared-namespace model permits.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ws-{{ .Values.user.name }}-build
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ws-{{ .Values.user.name }}-build
subjects:
- kind: ServiceAccount
  name: ws-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}