apiVersion: v1
kind: ServiceAccount
metadata:
  name: ws-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
---
# Namespace-scoped: every kubectl call from the workspace targets its own
# namespace (CronManager reads /var/run/secrets/.../namespace and passes
# `-n $ns` explicitly). A ClusterRole would let a workspace user list pods /
# read logs / mutate Secrets cluster-wide, which on this shared DOKS cluster
# means cross-tenant exposure to ~20 unrelated apps.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ws-{{ .Values.user.name }}-build
  namespace: {{ .Values.namespace }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
# Secrets: this workspace is now the SOLE tenant of its namespace
# (ws-<user>, issue #103), so every Secret here belongs to this user. The
# broad `create`/`get`/`update`/`patch`/`delete` grant that was a
# cross-tenant risk in the shared `coder` namespace is contained by the
# namespace boundary — a pod here cannot name, read, or mutate another
# tenant's Secret because that Secret lives in a different namespace this
# Role has no binding in. `list` stays omitted (defence in depth / least
# privilege — the workspace only ever touches Secrets it knows by name),
# and `create` remains name-unscoped because Kubernetes can't authorize a
# create by object name; both are safe under per-workspace namespaces.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "get", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ws-{{ .Values.user.name }}-build
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ws-{{ .Values.user.name }}-build
subjects:
- kind: ServiceAccount
  name: ws-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}