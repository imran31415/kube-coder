{{- /*
  Holds the embedding-provider API key for Phase-2 semantic memory (#90).
  Created only when embeddings are enabled (provider != none), a key is
  provided inline, and the operator isn't pointing at an existing Secret.
  Supply apiKey via a gitignored per-user overlay (secrets/<user>/memory.yaml).
*/ -}}
{{- if and (ne (.Values.memory.embeddings.provider | default "none") "none") .Values.memory.embeddings.apiKey (not .Values.memory.embeddings.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: memory-secrets-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  embedding-api-key: {{ .Values.memory.embeddings.apiKey | quote }}
{{- end }}
