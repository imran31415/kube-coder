{{- if eq .Values.ingress.auth.type "oauth2" }}
# Ingress for the workspace API — no OAuth2 proxy, Bearer-token auth instead.
# This is what the mobile app + scripts/curl use without a browser session: the
# task API (/api/claude/*), the memory store (/api/memory*), and the /metrics +
# /health probes. All are served by BrowserHandler on port 6080.
# Auth: /api/claude, /api/memory and /metrics verify the Bearer token
# (check_claude_auth); only /health is unauthenticated (a plain liveness probe).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ws-{{ .Values.user.name }}-claude-api
  namespace: {{ .Values.namespace }}
  labels:
    app: ws-{{ .Values.user.name }}
  annotations:
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.clusterIssuer }}
    {{- end }}
    # Route through a /bearer-api/ marker prefix. server.py's
    # _consume_bearer_marker() strips it and flags the request "bearer-only", so
    # it never trusts upstream identity headers (X-Auth-Request-*, Remote-User)
    # on this path — the Bearer token is the only accepted credential. This is
    # the primary, deployment-independent guard against a forged identity header
    # here (rewrite-target is core nginx, unlike snippet annotations below).
    nginx.ingress.kubernetes.io/rewrite-target: /bearer-api/$1
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Belt-and-suspenders: also strip the identity headers at the edge so they
    # never reach the pod. Requires ingress-nginx `allow-snippet-annotations:
    # "true"` (off by default in newer ingress-nginx); the /bearer-api/ marker
    # above enforces the same guarantee server-side even when snippets are off.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Auth-Request-User "";
      proxy_set_header X-Auth-Request-Email "";
      proxy_set_header X-Auth-Request-Access-Token "";
      proxy_set_header Remote-User "";
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
  - hosts:
    - {{ .Values.user.host }}
    secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
  - host: {{ .Values.user.host }}
    http:
      paths:
      # The capture group is re-applied by rewrite-target (/$1), so the path
      # reaches BrowserHandler unchanged. Covers the task API, memory store, and
      # the metrics/health probes the mobile client polls.
      - path: /(api/claude/.*|api/memory.*|metrics|health)
        pathType: ImplementationSpecific
        backend:
          service:
            name: ws-{{ .Values.user.name }}
            port:
              number: 6080
{{- end }}
