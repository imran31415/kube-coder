{{- if or .Values.assistant.openrouter.apiKey .Values.assistant.fallback.baseUrl }}
apiVersion: v1
kind: Secret
metadata:
  name: assistant-secrets-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  {{- if .Values.assistant.openrouter.apiKey }}
  openrouter-api-key: {{ .Values.assistant.openrouter.apiKey | quote }}
  {{- end }}
  {{- if .Values.assistant.fallback.baseUrl }}
  fallback-base-url: {{ .Values.assistant.fallback.baseUrl | quote }}
  fallback-api-key: {{ .Values.assistant.fallback.apiKey | quote }}
  {{- end }}
{{- end }}
