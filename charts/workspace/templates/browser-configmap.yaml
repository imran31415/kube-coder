apiVersion: v1
kind: ConfigMap
metadata:
  name: browser-config-{{ .Values.user.name }}
  namespace: {{ .Values.namespace }}
# HTML/CSS/JS for the dashboard lives in browser-html-{{ .Values.user.name }}
# (separate ConfigMap, not checksummed in the deployment) so dashboard-only
# changes don't require a pod restart. Keep this ConfigMap to Python source
# + supporting files — those DO need a restart when changed.
data:
  server.py: |
{{ .Files.Get "server.py" | indent 4 }}
  harness.py: |
{{ .Files.Get "harness.py" | indent 4 }}
  harness_test.py: |
{{ .Files.Get "harness_test.py" | indent 4 }}
  mcp_memory.py: |
{{ .Files.Get "mcp_memory.py" | indent 4 }}
  memory_inject_hook.py: |
{{ .Files.Get "memory_inject_hook.py" | indent 4 }}
  seed_claude_config.py: |
{{ .Files.Get "seed_claude_config.py" | indent 4 }}
  playwright_reaper.py: |
{{ .Files.Get "playwright_reaper.py" | indent 4 }}
  seed_demo.py: |
{{ .Files.Get "seed_demo.py" | indent 4 }}
  memory__init__.py: |
{{ .Files.Get "memory/__init__.py" | indent 4 }}
  memory_store.py: |
{{ .Files.Get "memory/store.py" | indent 4 }}
  memory_manager.py: |
{{ .Files.Get "memory/manager.py" | indent 4 }}
  memory_sync.py: |
{{ .Files.Get "memory/sync.py" | indent 4 }}
  memory_embeddings.py: |
{{ .Files.Get "memory/embeddings.py" | indent 4 }}
  memory_embeddings_worker.py: |
{{ .Files.Get "memory/embeddings_worker.py" | indent 4 }}
  mcp_agent_orchestrator.py: |
{{ .Files.Get "mcp_agent_orchestrator.py" | indent 4 }}
  mcp_dashboard.py: |
{{ .Files.Get "mcp_dashboard.py" | indent 4 }}
  hypervisor_session.py: |
{{ .Files.Get "hypervisor_session.py" | indent 4 }}