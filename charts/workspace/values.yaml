# Workspace configuration
#
# Each workspace gets its OWN namespace, `ws-<user>` (issue #103) — the same
# string as the Deployment/ServiceAccount. This is what makes tenant isolation
# real: a workspace pod's ServiceAccount can only see Secrets/pods in its own
# namespace, so the predictable-secret-name cross-tenant read that the shared
# `coder` namespace allowed is closed by construction.
#
# The scaffold (scripts/new-user.sh), the controller provisioner, and
# `make deploy` all set this to `ws-<user>` and create+label the namespace
# out-of-band before `helm install`. The default below is only a fallback for
# bare `helm template`/`helm install` invocations.
namespace: coder

# User configuration
user:
  name: ""
  # Home-volume size. 20Gi is a sensible default for a dev workspace; bump
  # per-user in their values.yaml if they need more. Note: PVCs can grow but
  # not shrink, so raising this later is fine — lowering it won't reclaim an
  # already-provisioned volume.
  pvcSize: 20Gi
  host: ""
  env:
    - name: GIT_USER_NAME
      value: ""
    - name: GIT_USER_EMAIL
      value: ""

# Container image configuration
image:
  repository: registry.digitalocean.com/resourceloop/coder
  tag: devlaptop-v1.29.0
  pullPolicy: Always
  pullSecretName: regcred

# Ingress configuration
#   auth.type:
#     "basic"  — http basic auth from .ingress.auth.secretName
#     "oauth2" — oauth2-proxy in front of every /oauth/* path
#     "none"   — bare TLS; anyone can hit it (use only with readOnly: true)
ingress:
  className: nginx
  # Emit a configuration-snippet on the Bearer-API ingress that strips identity
  # headers at the edge. Only enable on clusters whose ingress-nginx allows
  # snippet annotations — with snippets disabled (this cluster: CVE-2021-25742
  # hardening) the admission webhook rejects the whole Ingress. Off by default;
  # the /bearer-api/ rewrite marker gives the same guarantee server-side.
  identityHeaderStripSnippet: false
  auth:
    type: basic
    secretName: ""
  tls:
    enabled: true
    secretName: ""
    clusterIssuer: letsencrypt-production
  # Caps applied only by ingress-public.yaml (auth.type=none). Defense in
  # depth around the unauthed demo surface — bump these for a higher-
  # traffic demo, but don't disable them.
  publicLimits:
    rps: 10
    connections: 20
    bodySize: "16k"

# "Workspace is restarting…" holding page (issue #184). A tiny always-up nginx
# Deployment (holding-<user>) wired in as the custom-error backend on the root
# dashboard ingress(es), so the ~1 min Recreate downtime of a self-serve update
# shows a branded auto-recovering page instead of a raw nginx 503. Separate
# Deployment (survives the workspace pod's Recreate), no PVC, tens of MiB.
holdingPage:
  enabled: true
  # nginx-unprivileged listens on 8080 as a non-root user, which fits the
  # read-only/non-root securityContext without extra config.
  image: nginxinc/nginx-unprivileged:1.27-alpine
  # One replica is enough for a transient holding page; bump to 2 if you want it
  # to survive a single-node drain during the restart window.
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 50m
      memory: 32Mi

# OAuth2 (GitHub) settings — only used when ingress.auth.type=oauth2.
# Real credentials should come from a gitignored overlay (e.g.
# secrets/<user>/oauth2.yaml). Public-repo defaults leave them empty,
# and oauth2-proxy.yaml renders a `required` guard so a forgotten
# overlay surfaces at `helm install` time rather than as a silently
# broken pod.
oauth2:
  cookieSecret: ""        # 16/24/32 random bytes, base64-encoded
  clientId: ""            # GitHub OAuth App client id
  clientSecret: ""        # GitHub OAuth App client secret
  githubUsers: ""         # comma-separated allowlist (optional)
  githubOrg: ""           # restrict to org members (optional)
  githubTeam: ""          # restrict to team slug (optional)
  # Session lifetime. GitHub OAuth apps issue no refresh token, so oauth2-proxy
  # cannot silently renew a session — it is hard-capped at cookieExpire, after
  # which the user must log in again. Default 30d so returning to the workspace
  # the next day doesn't force a re-login. cookieRefresh is a no-op for GitHub
  # (no token to refresh); keep it 0 to avoid pointless re-validation/log spam.
  cookieExpire: "720h0m0s"  # 30 days
  cookieRefresh: "0"        # disabled — GitHub has no refresh token

# Read-only public demo mode. When true:
#   - server.py rejects every POST/DELETE/PUT with 403 readonly
#   - the dashboard SPA hides New/Edit/Delete/Kill/Rename/Send UI
#   - the workspace pod boots with readOnlyRootFilesystem + tmpfs scratch
#   - the kube-coder source clone is skipped (no writes)
#   - the docker-in-docker sidecar is dropped
# Hard-coupled to ingress.auth.type=none so we never accidentally expose a
# mutable workspace without auth — server.py refuses to start in that combo.
readOnly: false

# Public-demo hint: when true, the read-only SPA shows ALL persistent
# memories on the Memory tab (including auto-imported `claude.*` notes)
# instead of just the curated demo set. The server still enforces
# read-only writes — this only affects what the SPA renders. Off by
# default; only flip on for a demo deployment where the visible memory
# is intended as documentation.
demoShowAll: false

# Self-serve version updates: lets a user update their OWN workspace to the
# latest release from the dashboard's Settings → Updates section. The workspace
# has no kube access, so the action is brokered to the workspace-controller's
# token-gated self-serve listener. Opt-in: create one Secret in the namespace
# with key `self-serve-token`, name it here AND in the controller chart's
# `controller.update.selfServeSecretName`. Empty (default) => the Updates
# section reports "self-serve unavailable" and admins update from the controller
# dashboard instead.
update:
  selfServeSecretName: ""
  # Override the controller self-serve URL. Defaults to the in-cluster Service
  # on its self-serve port, in the controller's own namespace (below):
  # http://workspace-controller.<controllerNamespace>.svc.cluster.local:8081
  controllerUrl: ""
  # Namespace the workspace-controller Service lives in. With per-workspace
  # namespaces the workspace no longer shares a namespace with the controller,
  # so the self-serve URL must target the control-plane namespace explicitly
  # rather than deriving it from this workspace's `.Values.namespace`.
  controllerNamespace: coder

# Resource limits and requests.
#
# Burstable by design: requests are a lean *scheduling floor* sized for a
# mostly-idle dev workspace (typical usage is well under 250m CPU), while
# limits stay generous so builds/tests can still burst to a couple of cores
# and a few GB. Keeping requests low is what lets a node pack ~10 workspaces
# instead of ~3 — scheduling reserves requests, not limits. A workspace that
# genuinely needs a higher baseline should override requests in its own
# values.yaml rather than raising this shared default.
resources:
  requests:
    # CPU request is the SCHEDULER RESERVATION, not a usage cap (that's limits).
    # An idle workspace (code-server + server.py) sits well under 100m and
    # bursts to the 2-core limit on demand regardless of this floor, so a high
    # request just strands node capacity as unschedulable reservation. Kept low
    # (100m) so nodes pack efficiently; a workspace that needs a guaranteed
    # higher baseline overrides this in its own values.yaml. See #95 / the
    # node-pool over-reservation that wedged scheduling at ~96% requested.
    cpu: "100m"
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

# Per-namespace ResourceQuota + LimitRange (see templates/resourcequota.yaml).
# Now that each workspace owns its namespace, the quota bounds a single tenant
# instead of a shared pool.
#
# The four requests/limits caps below default to "" => AUTO-DERIVED from the
# workspace pod's own resources: the sum across ide + the privileged `dind`
# build sidecar (present when build.mode=buildkit), plus a fixed overhead for
# the oauth2-proxy pair, one in-flight build Job, and the cert-manager ACME
# solver. This keeps the quota correct as a workspace's ide/dind limits change,
# instead of a static ceiling a heavier workspace could exhaust by itself —
# which starved oauth2-proxy + cert-manager and took a workspace's ingress/TLS
# down on migration (#103). Pin any field to override the derived value. These
# are ceilings, not reservations, so a lighter (kaniko / no-dind) workspace only
# requests what it uses. Ties into #95.
quota:
  enabled: true
  requestsCpu: ""      # "" => derive (ide+dind requests + overheadReq*)
  requestsMemory: ""
  limitsCpu: ""        # "" => derive (ide+dind limits + overhead*)
  limitsMemory: ""
  pods: "20"
  # Headroom added on top of the derived pod sum (oauth2-proxy pair + one build
  # Job + ACME solver + margin). Tune if your auxiliary pods differ.
  overheadCpuMilli: 2000
  overheadMemoryMi: 4096
  overheadReqCpuMilli: 500
  overheadReqMemoryMi: 1024
  # LimitRange defaults applied to any container that omits its own
  # requests/limits (e.g. ad-hoc build Jobs), so nothing runs unbounded.
  limitRange:
    enabled: true
    defaultRequestCpu: "100m"
    defaultRequestMemory: 256Mi
    defaultLimitCpu: "1"
    defaultLimitMemory: 1Gi

# Cross-namespace access for the workspace-controller admin console. With
# per-workspace namespaces the controller runs in its own control-plane
# namespace and reaches this workspace via a RoleBinding the chart renders here
# (templates/controller-rbac.yaml), binding the controller's ServiceAccount to
# the cluster-defined `workspace-controller` ClusterRole — scoped to THIS
# namespace only (no cluster-wide scale grant). Disable if you wire controller
# RBAC out-of-band.
controller:
  namespace: coder
  serviceAccount: workspace-controller
  clusterRole: workspace-controller
  rbac:
    enabled: true

# Build configuration.
#
#   mode: kaniko    (default, recommended)
#     Image builds run as a one-shot Kaniko Job in the user's namespace,
#     scheduled by the `docker-build` wrapper. No daemon, no privileged
#     container. `docker run` and `docker buildx` are NOT available from
#     the user's shell.
#
#   mode: buildkit
#     Adds a `dind` sidecar to every workspace pod running with
#     `privileged: true` + UID 0. This gives `docker buildx` and ad-hoc
#     `docker run` from the user's shell, but a shell in either container
#     can escape to the underlying node. On a shared multi-tenant cluster
#     prefer `kaniko` unless `docker run` is required.
build:
  mode: kaniko
  kanikoImage: gcr.io/kaniko-project/executor:latest
  pushSecretName: regcred
  defaultDestinationRepo: registry.digitalocean.com/resourceloop/coder

# SSH server configuration. When enabled, an `ssh-server` sidecar runs in
# the workspace pod (root, port 22, shares the home PVC). Access via
# `kubectl port-forward` for initial testing; add a Service of type
# LoadBalancer or ingress TCP services for permanent external access.
ssh:
  enabled: false
  port: 22
  # Public keys allowed to log in as the `ubuntu` user. One key per line.
  # Equivalent to ~/.ssh/authorized_keys content. Provide via secrets file
  # for production; inline is fine for testing.
  authorizedKeys: ""

# code-server (VS Code in the browser) is on by default. Set enabled=false
# to skip the launch entirely — useful for workspaces accessed via SSH
# (Zed remote-dev, JetBrains Gateway, VS Code remote-ssh, etc.) where the
# user's local editor connects directly and code-server's ~400MB baseline
# is just wasted memory.
codeServer:
  enabled: true

# In-pod virtual-desktop browser stack (Xvfb + fluxbox + x11vnc + websockify)
# is on by default. It backs the dashboard's "Launch browser" button and the
# Preview pane's *Browser* mode (noVNC), plus any GUI app on DISPLAY=:99.
# Set enabled=false to skip it entirely and reclaim its ~95MB idle baseline
# (measured: Xvfb ~31MB + websockify ~38MB + x11vnc ~15MB + fluxbox ~11MB).
# The Preview pane's default *App* mode renders target apps through a
# reverse-proxy iframe and does NOT depend on this stack — only the explicit
# Browser toggle and GUI apps do. Firefox itself is already on-demand
# (launched via the dashboard, not at boot), so this gates only the always-on
# X/VNC scaffolding.
browser:
  enabled: true

# Claude Code configuration
# Two auth methods are supported:
#   1. OAuth (subscription): Leave apiKey empty, run `claude` in the pod once to login interactively.
#   2. API key (pay-per-use): Set apiKey below or via --set claude.apiKey=sk-ant-...
# If apiKey is set, it takes precedence over OAuth.
claude:
  apiKey: ""

# Hypervisor — the workspace-aware chat tab. A clean chat interface layered
# over the user's existing CLI agents (claude, ante, opencode, …) plus a
# dashboard MCP server that lets the chat inspect live workspace state and take
# UI-equivalent actions. There is no new provider/model config here: the chat
# uses whichever assistant the user selects, configured via the assistant.*
# blocks below (and the user's own ~/.ante/settings.json etc.).
hypervisor:
  enabled: true
  # Which assistant a new chat thread uses by default. The user can switch it
  # per-thread from the tab's selector (any enabled assistant).
  defaultAssistant: "claude"
  # Working directory for hypervisor chat sessions.
  workdir: "/home/dev"

# Optional alternate assistants. Claude Code is always available (above);
# OpenCode (https://opencode.ai) becomes a *per-task* choice in the
# dashboard whenever either of the blocks below is configured. Both blocks
# are independent — set one, the other, or both. Real credentials should
# come from a gitignored secrets file (e.g. secrets/<user>/assistant.yaml).
# Public-repo defaults leave both empty, so the dashboard ships with
# Claude-only behavior.
assistant:
  # OpenCode → OpenRouter (https://openrouter.ai)
  openrouter:
    apiKey: ""                            # OPENROUTER_API_KEY (per-user; takes precedence)
    model: "anthropic/claude-sonnet-4"
    # Optional shared OpenRouter secret so EVERY workspace gets OpenRouter
    # without a per-user key: create one Secret (key: openrouter-api-key) in the
    # namespace and name it here. A per-user apiKey above still wins. Empty by
    # default — set per deployment (e.g. in the new-user scaffold).
    sharedSecretName: ""
  # OpenCode → DeepSeek (https://api.deepseek.com)
  # DeepSeek is a first-class OpenCode provider: the CLI auto-discovers
  # the key from $DEEPSEEK_API_KEY, so no on-disk provider stub is needed.
  deepseek:
    apiKey: ""                            # DEEPSEEK_API_KEY
    model: "deepseek-chat"                # or "deepseek-reasoner"
  # Antigravity (https://antigravity.google) — Google's terminal coding agent
  # (`agy`), pre-installed in the image. Auth is OAuth Google Sign-In, NOT an
  # API key: it appears as a dashboard assistant automatically, and each user
  # runs `agy` once in the pod (prints a URL + one-time code) to log in — the
  # login persists on the PVC. Only an optional model override lives here.
  antigravity:
    model: ""                             # KC_ANTIGRAVITY_MODEL (blank = agy's default)
  # LibreFang (https://librefang.ai) — open-source agent OS. The CLI is
  # pre-installed in the image (like Ante) and reuses whatever provider keys
  # are configured elsewhere (ANTHROPIC_API_KEY, OPENROUTER_API_KEY, …), so
  # there is no key to set here. `agent` picks which LibreFang agent tasks
  # talk to; the registry-bundled "coder" is the right default for a coding
  # workspace.
  librefang:
    agent: "coder"                        # KC_LIBREFANG_AGENT
  # OpenCode → any OpenAI-compatible endpoint
  # (e.g. a private proxy running on your own Digital Ocean droplet)
  fallback:
    baseUrl: ""                           # e.g. https://llm.example.com/v1
    apiKey: ""                            # optional bearer token
    model: "anthropic/claude-sonnet-4"
    providerId: "kube-coder-fallback"     # OpenCode provider id (free-form)
    providerName: "Kube-Coder Fallback"

# Persistent memory subsystem. SQLite-backed at /home/dev/.claude-memory/memory.db,
# exposed to the dashboard at /api/memory and to claude via the `memory` MCP server.
# Phase 1 ships with these defaults; phases 2-3 activate by flipping flags here.
memory:
  # Embedding provider for semantic recall. Default "none" = FTS5 keyword
  # search only. Set provider + apiKey to activate Phase-2 hybrid vector
  # search (a background worker embeds memories; search fuses FTS + vectors).
  # See docs/persistent-memory.md.
  embeddings:
    provider: "none"        # one of: none | voyage | openai
    model: ""               # blank -> provider default (voyage-3 / text-embedding-3-small)
    dim: ""                 # output dim; blank -> 1024 (matches vec_memories FLOAT[1024])
    # Provider API key. Supply via a gitignored per-user overlay
    # (e.g. secrets/<user>/memory.yaml) — never a public values file. The
    # chart writes it into Secret memory-secrets-<user> and injects it as
    # VOYAGE_API_KEY / OPENAI_API_KEY. Or point existingSecretName at a
    # pre-made Secret with key `embedding-api-key`.
    apiKey: ""
    existingSecretName: ""
    baseUrl: ""             # openai-compatible endpoint (self-hosted / proxy)
  # Auto-injection: prefix new task prompts with the top-K relevant memories.
  inject:
    enabled: true
    topK: 8
    minScore: 0.30
    maxChars: 4096
  # Background consolidation (dedupe + decay). Phase 3 activates this thread.
  consolidation:
    enabled: false
    intervalHours: 6

# GitHub App configuration for automatic git/gh authentication.
# Two ways to supply credentials:
#  (1) Inline via appId / installationId / privateKey (the chart creates a
#      Secret named github-app-secrets-<user>). Provide secrets via a
#      values overlay (e.g., secrets/<user>/github-app.yaml). RECOMMENDED.
#  (2) Reference an existing Secret in the same namespace via
#      `existingSecretName`. The Secret must have keys: app-id,
#      installation-id, private-key. Set `appId: "use-existing"` (or any
#      non-empty placeholder) to flip the deployment env-var gate; the
#      actual values come from the referenced Secret.
#
# SECURITY: option (2) lets multiple workspaces share one GitHub App
# private key. Anyone with shell access in a workspace can `cat` that
# key and act as the App on every repo it's installed on. Use only for
# workspaces operated by the same trusted principal — never to give
# another developer a workspace pre-wired to your App.
github:
  app:
    appId: ""
    installationId: ""
    privateKey: ""
    existingSecretName: ""