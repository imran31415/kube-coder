suite: deployment tests
templates:
  - templates/deployment.yaml
  - templates/browser-configmap.yaml
  - templates/claude-configmap.yaml
  - templates/terminal-entry-configmap.yaml
  - templates/workspace-entrypoint-configmap.yaml
  - templates/assistant-secret.yaml
  - templates/ssh-server-configmap.yaml
values:
  - test-values.yaml
tests:
  - it: should set the deployment name from user.name
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: ws-testuser

  - it: should set the correct namespace
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.namespace
          value: test

  - it: should use Recreate strategy
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should set the container image from values
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "test-registry/coder:test"

  - it: should run as non-root user 1000
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: should expose all required ports
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 8080
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: terminal
            containerPort: 7681
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: browser
            containerPort: 6080
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: vnc
            containerPort: 6081

  - it: should configure readiness probe on port 6080
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: 6080
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: should configure liveness probe on the cheap /livez endpoint
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: 6080
      # Liveness uses /livez (zero-work), not /health (which does blocking
      # sub-service socket connects) — see send_livez in server.py.
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /livez
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 6

  - it: should mount the home PVC
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: home
            mountPath: /home/dev
      - contains:
          path: spec.template.spec.volumes
          content:
            name: home
            persistentVolumeClaim:
              claimName: ws-testuser-home

  - it: should set resource limits and requests
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "100m"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: "256Mi"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "1"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: "1Gi"

  - it: should include imagePullSecrets when pullSecretName is set
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: regcred

  - it: should mount the claude-config volume
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: claude-config
            mountPath: /claude-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: claude-config
            configMap:
              name: claude-config-testuser
              defaultMode: 292

  - it: should always overwrite CLAUDE.md from chart during startup
    template: templates/workspace-entrypoint-configmap.yaml
    asserts:
      - matchRegex:
          path: data["start.sh"]
          pattern: "cp /claude-config/CLAUDE.md /home/dev/CLAUDE.md"

  - it: always marks the pod as a kube-coder environment
    template: templates/deployment.yaml
    asserts:
      # Canonical flag — visible to every process in the pod.
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KUBE_CODER
            value: "1"
      # Expo-public alias so the marker reaches client/browser bundles.
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: EXPO_PUBLIC_KUBE_CODER
            value: "1"

  - it: open-source defaults inject no assistant env vars
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: OPENROUTER_API_KEY
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: DEEPSEEK_API_KEY
      - notContains:
          path: spec.template.spec.containers[0].env
          any: true
          content:
            name: KC_FALLBACK_BASE_URL

  - it: injects OpenRouter env when openrouter.apiKey is set
    template: templates/deployment.yaml
    set:
      assistant.openrouter.apiKey: sk-or-test
      assistant.openrouter.model: anthropic/claude-sonnet-4
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENROUTER_API_KEY
            valueFrom:
              secretKeyRef:
                name: assistant-secrets-testuser
                key: openrouter-api-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KC_OPENROUTER_MODEL
            value: "anthropic/claude-sonnet-4"

  - it: injects OpenRouter env from the shared secret when sharedSecretName is set (no per-user key)
    template: templates/deployment.yaml
    set:
      assistant.openrouter.sharedSecretName: coder-shared-assistant
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENROUTER_API_KEY
            valueFrom:
              secretKeyRef:
                name: coder-shared-assistant
                key: openrouter-api-key

  - it: should NOT wire self-serve updates by default
    template: templates/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONTROLLER_SELF_SERVE_URL
            value: ""
      - notExists:
          path: spec.template.metadata.labels["kube-coder.dev/component"]

  - it: wires the controller broker env + pod label when self-serve is enabled
    template: templates/deployment.yaml
    set:
      update.selfServeSecretName: kc-self-serve
    asserts:
      - equal:
          path: spec.template.metadata.labels["kube-coder.dev/component"]
          value: workspace
      # Per-workspace namespaces (#103): the workspace no longer shares a
      # namespace with the controller, so the self-serve URL targets the
      # control-plane namespace (controllerNamespace, default "coder") — NOT
      # this workspace's own .Values.namespace.
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONTROLLER_SELF_SERVE_URL
            value: http://workspace-controller.coder.svc.cluster.local:8081
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONTROLLER_SELF_SERVE_TOKEN
            valueFrom:
              secretKeyRef:
                name: kc-self-serve
                key: self-serve-token

  - it: targets controllerNamespace for the default self-serve URL
    template: templates/deployment.yaml
    set:
      update.selfServeSecretName: kc-self-serve
      update.controllerNamespace: kube-coder-system
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONTROLLER_SELF_SERVE_URL
            value: http://workspace-controller.kube-coder-system.svc.cluster.local:8081

  - it: honours an explicit controllerUrl override for self-serve
    template: templates/deployment.yaml
    set:
      update.selfServeSecretName: kc-self-serve
      update.controllerUrl: http://my-controller:9000
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CONTROLLER_SELF_SERVE_URL
            value: http://my-controller:9000

  - it: injects DeepSeek env when deepseek.apiKey is set
    template: templates/deployment.yaml
    set:
      assistant.deepseek.apiKey: sk-ds-test
      assistant.deepseek.model: deepseek-chat
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEEPSEEK_API_KEY
            valueFrom:
              secretKeyRef:
                name: assistant-secrets-testuser
                key: deepseek-api-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KC_DEEPSEEK_MODEL
            value: "deepseek-chat"

  - it: injects Antigravity model env when antigravity.model is set (OAuth — no API key)
    template: templates/deployment.yaml
    set:
      assistant.antigravity.model: gemini-3-pro
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KC_ANTIGRAVITY_MODEL
            value: "gemini-3-pro"

  - it: injects fallback env when fallback.baseUrl is set
    template: templates/deployment.yaml
    set:
      assistant.fallback.baseUrl: https://llm.example.com/v1
      assistant.fallback.apiKey: bearer-test
      assistant.fallback.model: anthropic/claude-sonnet-4
      assistant.fallback.providerId: kube-coder-fallback
      assistant.fallback.providerName: Kube-Coder Fallback
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KC_FALLBACK_BASE_URL
            valueFrom:
              secretKeyRef:
                name: assistant-secrets-testuser
                key: fallback-base-url
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: KC_FALLBACK_API_KEY
            valueFrom:
              secretKeyRef:
                name: assistant-secrets-testuser
                key: fallback-api-key

  - it: writes opencode config in the entrypoint when any opencode provider is set
    template: templates/workspace-entrypoint-configmap.yaml
    set:
      assistant.openrouter.apiKey: sk-or-test
    asserts:
      - matchRegex:
          path: data["start.sh"]
          pattern: "writing OpenCode config"
      - matchRegex:
          path: data["start.sh"]
          pattern: "HOME/.config/opencode/opencode.json"

  - it: skips assistant-secret rendering when neither opencode provider is configured
    template: templates/assistant-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders assistant-secret with both keys when both providers are set
    template: templates/assistant-secret.yaml
    set:
      assistant.openrouter.apiKey: sk-or-test
      assistant.fallback.baseUrl: https://llm.example.com/v1
      assistant.fallback.apiKey: bearer-test
    asserts:
      - equal:
          path: stringData["openrouter-api-key"]
          value: "sk-or-test"
      - equal:
          path: stringData["fallback-base-url"]
          value: "https://llm.example.com/v1"
      - equal:
          path: stringData["fallback-api-key"]
          value: "bearer-test"

  - it: renders assistant-secret with deepseek key when only deepseek is set
    template: templates/assistant-secret.yaml
    set:
      assistant.deepseek.apiKey: sk-ds-test
    asserts:
      - equal:
          path: stringData["deepseek-api-key"]
          value: "sk-ds-test"

  - it: should invoke the entrypoint script as the container command
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command
          value: ["/bin/bash", "-l", "/workspace-entrypoint/start.sh"]

  - it: should mount the workspace-entrypoint configmap
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: workspace-entrypoint
            mountPath: /workspace-entrypoint
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workspace-entrypoint
            configMap:
              name: workspace-entrypoint-testuser
              defaultMode: 365

  # Regression guard for the cc18d99 hardening breakage: pod-level
  # runAsNonRoot:true contradicts containers that legitimately need
  # runAsUser:0 (dind for docker daemon, sshd for port 22 + user shells).
  # Without an explicit container-level runAsNonRoot:false override, K8s
  # admission rejects the pod with CreateContainerConfigError.
  - it: dind sidecar overrides pod runAsNonRoot when buildkit is enabled
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: dind
      - equal:
          path: spec.template.spec.containers[1].securityContext.runAsNonRoot
          value: false
      - equal:
          path: spec.template.spec.containers[1].securityContext.runAsUser
          value: 0
      - equal:
          path: spec.template.spec.containers[1].securityContext.privileged
          value: true

  - it: dind sidecar is absent in kaniko build mode
    template: templates/deployment.yaml
    set:
      build.mode: kaniko
    asserts:
      - notContains:
          path: spec.template.spec.containers
          content:
            name: dind
          any: true

  - it: ssh-server sidecar overrides pod runAsNonRoot when ssh is enabled
    template: templates/deployment.yaml
    set:
      ssh.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[2].name
          value: ssh-server
      - equal:
          path: spec.template.spec.containers[2].securityContext.runAsNonRoot
          value: false
      - equal:
          path: spec.template.spec.containers[2].securityContext.runAsUser
          value: 0
