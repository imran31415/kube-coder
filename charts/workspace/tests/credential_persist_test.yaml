suite: per-tool credential persistence (#243)
# The interactive terminals run with HOME=/home/ubuntu (ephemeral), so
# without these redirects onto the persistent /home/dev/.credentials store,
# Expo/npm/Docker/AWS/gcloud logins are wiped on every pod restart.
templates:
  - templates/workspace-entrypoint-configmap.yaml
  - templates/ssh-server-configmap.yaml
values:
  - test-values.yaml
tests:
  - it: redirects each per-tool credential path onto the PVC in start.sh
    template: templates/workspace-entrypoint-configmap.yaml
    asserts:
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .expo\\s+dir"
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .docker\\s+dir"
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .aws\\s+dir"
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .config/gcloud\\s+dir"
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .npmrc\\s+file"
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .git-credentials file"
      - matchRegex:
          path: data["start.sh"]
          pattern: "persist_cred .config/.wrangler dir"

  - it: migrates an existing login once, no-clobber, before symlinking
    template: templates/workspace-entrypoint-configmap.yaml
    asserts:
      # cp -an = archive + no-clobber, so a real PVC login is never
      # overwritten by a stale ephemeral copy on restart.
      - matchRegex:
          path: data["start.sh"]
          pattern: 'cp -an "\$link/\." "\$target/"'
      - matchRegex:
          path: data["start.sh"]
          pattern: 'ln -sfn "\$target" "\$link"'

  - it: mirrors the same layout into the SSH sidecar when ssh is enabled
    template: templates/ssh-server-configmap.yaml
    set:
      ssh.enabled: true
    asserts:
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: "ln -sfn /home/dev/.credentials/.expo\\s+/home/ubuntu/.expo"
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: "ln -sf  /home/dev/.credentials/.npmrc\\s+/home/ubuntu/.npmrc"
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: "ln -sf  /home/dev/.credentials/.git-credentials /home/ubuntu/.git-credentials"
      - matchRegex:
          path: data["entrypoint.sh"]
          pattern: "ln -sfn /home/dev/.credentials/.config/.wrangler /home/ubuntu/.config/.wrangler"
