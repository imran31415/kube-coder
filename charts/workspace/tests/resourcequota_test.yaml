suite: per-namespace ResourceQuota + LimitRange (#103)
templates:
  - templates/resourcequota.yaml
tests:
  - it: derives the quota from the pod's resources (default kaniko workspace)
    # ide 4Gi/2 (chart default), no dind. limits = ide + overhead (2000m/4096Mi);
    # requests = ide requests 100m/1Gi + overheadReq (500m/1024Mi).
    set:
      user.name: alice
      namespace: ws-alice
    documentIndex: 0
    asserts:
      - isKind:
          of: ResourceQuota
      - equal:
          path: metadata.name
          value: ws-alice-quota
      - equal:
          path: metadata.namespace
          value: ws-alice
      - equal:
          path: spec.hard["requests.cpu"]
          value: "600m"
      - equal:
          path: spec.hard["requests.memory"]
          value: 2048Mi
      - equal:
          path: spec.hard["limits.cpu"]
          value: "4000m"
      - equal:
          path: spec.hard["limits.memory"]
          value: 8192Mi
      - equal:
          path: spec.hard.pods
          value: "20"

  - it: adds the dind sidecar to the derived quota (buildkit)
    # ide 4Gi/2 + dind 4Gi/2 + overhead 4Gi/2 = 12288Mi / 6000m.
    set:
      user.name: alice
      namespace: ws-alice
      build.mode: buildkit
    documentIndex: 0
    asserts:
      - equal:
          path: spec.hard["limits.cpu"]
          value: "6000m"
      - equal:
          path: spec.hard["limits.memory"]
          value: 12288Mi

  - it: scales the quota with a heavier ide (no manual override needed)
    # ide 8Gi + dind 4Gi + overhead 4Gi = 16384Mi (16Gi) — the value that used
    # to require a hand-set quota override.
    set:
      user.name: alice
      namespace: ws-alice
      build.mode: buildkit
      resources.limits.memory: 8Gi
    documentIndex: 0
    asserts:
      - equal:
          path: spec.hard["limits.memory"]
          value: 16384Mi

  - it: renders a LimitRange with container defaults
    set:
      user.name: alice
      namespace: ws-alice
    documentIndex: 1
    asserts:
      - isKind:
          of: LimitRange
      - equal:
          path: metadata.namespace
          value: ws-alice
      - equal:
          path: spec.limits[0].default.cpu
          value: "1"
      - equal:
          path: spec.limits[0].defaultRequest.memory
          value: 256Mi

  - it: honours quota overrides
    set:
      user.name: alice
      namespace: ws-alice
      # An explicit value pins the quota, bypassing derivation. Distinct from any
      # derived value so this proves the override path, not a coincidental match.
      quota.limitsCpu: "16"
      quota.requestsMemory: 6Gi
    documentIndex: 0
    asserts:
      - equal:
          path: spec.hard["limits.cpu"]
          value: "16"
      - equal:
          path: spec.hard["requests.memory"]
          value: 6Gi

  - it: renders nothing when quota is disabled
    set:
      user.name: alice
      namespace: ws-alice
      quota.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: drops the LimitRange but keeps the quota when limitRange is disabled
    set:
      user.name: alice
      namespace: ws-alice
      quota.limitRange.enabled: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ResourceQuota
