# Base infrastructure configuration
namespace: coder

# Docker registry configuration
registry:
  name: regcred
  server: registry.digitalocean.com

# Build configuration
build:
  mode: buildkit  # kaniko or buildkit
  # Pinned for reproducible builds; Renovate bumps the tag+digest weekly.
  kanikoImage: gcr.io/kaniko-project/executor:v1.24.0
  defaultDestinationRepo: registry.digitalocean.com/resourceloop/coder