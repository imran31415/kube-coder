suite: workspace-controller RBAC
templates:
  - templates/serviceaccount.yaml
values:
  - test-values.yaml
# Document order (provision disabled — test-values default):
#   0 ServiceAccount
#   1 ClusterRole        workspace-controller            (workspace verbs)
#   2 ClusterRole        workspace-controller-discovery  (namespaces list)
#   3 ClusterRoleBinding workspace-controller-discovery
#   4 RoleBinding        workspace-controller            (own-namespace grant)
tests:
  - it: defines the workspace verbs as a ClusterRole (granted per-namespace, not cluster-wide)
    documentIndex: 1
    asserts:
      - equal:
          path: kind
          value: ClusterRole
      - equal:
          path: metadata.name
          value: workspace-controller
      # A ClusterRole has no namespace — it is bound INTO each ws-<user>
      # namespace by the workspace chart, confining the verbs there.
      - notExists:
          path: metadata.namespace

  - it: should grant get+list+watch on deployments
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["get", "list", "watch"]

  - it: should grant scale (get/update/patch) so start/stop works
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments/scale"]
            verbs: ["get", "update", "patch"]

  - it: should grant pods get+list for status detection
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list"]

  - it: should grant pvc reads for disk usage + insights (regression guard for 3a7991a)
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["persistentvolumeclaims"]
            verbs: ["get", "list"]

  - it: should grant ingress reads so the UI can show workspace URLs
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.io"]
            resources: ["ingresses"]
            verbs: ["get", "list"]

  # Finding 4 (July 2026 review): the controller's OWN RBAC must never carry the
  # provisioner's cluster-wide create/delete verbs. The controller only launches
  # a Job (see the provisioning Role below) — it must not be able to mutate
  # tenant workloads, read/write Secrets, or grant RBAC directly.
  - it: does not grant the provisioner's cluster-wide write verbs to the controller
    documentIndex: 1
    asserts:
      # No create/delete on deployments — only read + scale + in-place patch.
      - notContains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      # No Secret access at all.
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["services", "persistentvolumeclaims", "configmaps", "secrets", "serviceaccounts"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      # No ability to grant RBAC.
      - notContains:
          path: rules
          content:
            apiGroups: ["rbac.authorization.k8s.io"]
            resources: ["roles", "rolebindings"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
      # No namespace create/delete.
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  - it: exposes a read-only namespace-discovery ClusterRole (the ONLY cluster-wide grant)
    documentIndex: 2
    asserts:
      - equal:
          path: kind
          value: ClusterRole
      - equal:
          path: metadata.name
          value: workspace-controller-discovery
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["get", "list", "watch"]
      # Discovery is list-only — it must never carry write verbs on namespaces.
      - notContains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["namespaces"]
            verbs: ["get", "list", "watch", "create", "delete"]

  - it: binds discovery cluster-wide to the controller SA
    documentIndex: 3
    asserts:
      - equal:
          path: kind
          value: ClusterRoleBinding
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: workspace-controller-discovery
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: workspace-controller
            namespace: test

  - it: grants the workspace verbs in the controller's own namespace via RoleBinding→ClusterRole
    documentIndex: 4
    asserts:
      - equal:
          path: kind
          value: RoleBinding
      - equal:
          path: metadata.namespace
          value: test
      - equal:
          path: roleRef.kind
          value: ClusterRole
      - equal:
          path: roleRef.name
          value: workspace-controller
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: workspace-controller
            namespace: test

  # With provisioning on, docs 5 + 6 are the namespace-local provisioning
  # Role + RoleBinding (NOT a ClusterRole — a controller compromise can only
  # start Jobs in its own namespace).
  - it: keeps the provisioning-jobs grant a namespace-local Role
    set:
      provision.enabled: true
    documentIndex: 5
    asserts:
      - equal:
          path: kind
          value: Role
      - equal:
          path: metadata.name
          value: workspace-controller-provision
      - equal:
          path: metadata.namespace
          value: test
      - contains:
          path: rules
          content:
            apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["get", "list", "watch", "create"]

  - it: binds the provisioning-jobs Role in the controller namespace
    set:
      provision.enabled: true
    documentIndex: 6
    asserts:
      - equal:
          path: kind
          value: RoleBinding
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: workspace-controller-provision
