suite: workspace-controller RBAC
templates:
  - templates/serviceaccount.yaml
values:
  - test-values.yaml
tests:
  - it: should create a namespace-scoped Role (never a ClusterRole)
    documentIndex: 1
    asserts:
      - equal:
          path: kind
          value: Role
      - equal:
          path: metadata.namespace
          value: test

  - it: should grant get+list+watch on deployments
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments"]
            verbs: ["get", "list", "watch"]

  - it: should grant scale (get/update/patch) so start/stop works
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["apps"]
            resources: ["deployments/scale"]
            verbs: ["get", "update", "patch"]

  - it: should grant pods get+list for status detection
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list"]

  - it: should grant pvc reads for disk usage + insights (regression guard for 3a7991a)
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: [""]
            resources: ["persistentvolumeclaims"]
            verbs: ["get", "list"]

  - it: should grant ingress reads so the UI can show workspace URLs
    documentIndex: 1
    asserts:
      - contains:
          path: rules
          content:
            apiGroups: ["networking.k8s.io"]
            resources: ["ingresses"]
            verbs: ["get", "list"]

  - it: should bind the SA to the Role
    documentIndex: 2
    asserts:
      - equal:
          path: kind
          value: RoleBinding
      - equal:
          path: roleRef.kind
          value: Role
      - equal:
          path: roleRef.name
          value: workspace-controller
      - contains:
          path: subjects
          content:
            kind: ServiceAccount
            name: workspace-controller
            namespace: test
