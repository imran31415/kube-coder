apiVersion: v1
kind: Service
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
spec:
  selector:
    app: workspace-controller
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  {{- if .Values.controller.update.selfServeSecretName }}
  # Token-gated self-serve listener: reached by workspace pods directly (the
  # admin :8080 path stays oauth2-only). See deployment/networkpolicy.
  - name: self-serve
    port: 8081
    targetPort: 8081
    protocol: TCP
  {{- end }}
