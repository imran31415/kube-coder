{{- if and .Values.controller.adminToken.enabled (not .Values.controller.adminToken.existingSecretName) }}
{{- /*
The persistent admin API token that lets the Expo mobile app reach the admin
API with `Authorization: Bearer <token>` (oauth2-proxy can't do a mobile OAuth
handshake). Rendered the same defense-in-depth way as the oauth2 cookie secret:
pin a known value with `controller.adminToken.value`, bring your own Secret with
`controller.adminToken.existingSecretName`, or (default) auto-generate a strong
token here. The generated value is PRESERVED across `helm upgrade` via a lookup
of the live Secret, so upgrades never silently rotate the token and break the
paired mobile clients. To rotate deliberately: delete this Secret (or set a new
`value`) and restart the controller Deployment.
*/}}
{{- $name := "workspace-controller-admin-token" }}
{{- $val := .Values.controller.adminToken.value }}
{{- if not $val }}
  {{- $existing := (lookup "v1" "Secret" .Values.namespace $name) }}
  {{- if and $existing $existing.data (index $existing.data "admin-token") }}
    {{- $val = (index $existing.data "admin-token" | b64dec) }}
  {{- else }}
    {{- $val = randAlphaNum 48 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ $val | quote }}
{{- end }}
