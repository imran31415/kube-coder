{{- if and .Values.provision.enabled (not .Values.provision.existingSecretName) }}
# Runtime credentials for provisioning, rendered from values the same way the
# oauth2 client secret is — so an operator only ever edits a gitignored
# users-private/_controller/secrets/provision.yaml overlay, never a committed
# file. Set provision.existingSecretName instead to bring your own Secret
# (e.g. one managed by sealed-secrets/SOPS), in which case this is not created.
#
#   git-token    — pushes generated config to provision.gitops.repo and reads
#                  the GitHub API (validate username). A GitHub App installation
#                  token or a fine-grained PAT scoped to that one repo.
apiVersion: v1
kind: Secret
metadata:
  name: workspace-controller-provision
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
type: Opaque
stringData:
  git-token: {{ required "provision.gitToken is required when provision.enabled (set it in users-private/_controller/secrets/provision.yaml)" .Values.provision.gitToken | quote }}
{{- end }}
