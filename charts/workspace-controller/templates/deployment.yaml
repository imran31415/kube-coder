apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workspace-controller
  template:
    metadata:
      labels:
        {{- include "wc.labels" . | nindent 8 }}
      annotations:
        # Roll the pod when the backend or the SPA changes (both ship via
        # ConfigMap, so the image digest alone won't trigger a restart).
        checksum/controller: {{ include (print $.Template.BasePath "/controller-configmap.yaml") . | sha256sum }}
        checksum/controller-web: {{ include (print $.Template.BasePath "/controller-web-configmap.yaml") . | sha256sum }}
    spec:
      # Keep the two replicas off the same node so a single node drain or
      # failure can't take the whole control plane down. Soft constraint
      # (ScheduleAnyway) so single-node clusters still schedule both pods.
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: workspace-controller
      serviceAccountName: workspace-controller
      {{- if .Values.controller.image.pullSecretName }}
      imagePullSecrets:
      - name: {{ .Values.controller.image.pullSecretName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: controller
        image: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
        imagePullPolicy: {{ .Values.controller.image.pullPolicy }}
        command: ["python3", "/controller/controller.py"]
        env:
        # kubectl writes a best-effort discovery cache under $HOME/.kube and
        # may use $TMPDIR; point both at writable emptyDirs so the readonly
        # root filesystem doesn't make it spew warnings.
        - name: HOME
          value: /home/controller
        - name: TMPDIR
          value: /tmp
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: CONTROLLER_PORT
          value: "8080"
        - name: CONTROLLER_DIST_DIR
          value: /controller-web
        - name: WORKSPACE_PREFIX
          value: {{ .Values.controller.workspacePrefix | quote }}
        - name: TRUSTED_PROXY
          value: "true"
        - name: ADMIN_USERS
          value: {{ .Values.controller.adminUsers | quote }}
        - name: PROMETHEUS_URL
          value: {{ .Values.controller.metrics.prometheusUrl | quote }}
        - name: COST_CPU_CORE_HOUR
          value: {{ .Values.controller.metrics.cost.cpuCoreHour | quote }}
        - name: COST_MEM_GB_HOUR
          value: {{ .Values.controller.metrics.cost.memGbHour | quote }}
        - name: COST_STORAGE_GB_MONTH
          value: {{ .Values.controller.metrics.cost.storageGbMonth | quote }}
        # The controller's own image ref, reused as the default provisioner Job
        # image (it already carries kubectl/git/make/curl).
        - name: CONTROLLER_IMAGE
          value: "{{ .Values.controller.image.repository }}:{{ .Values.controller.image.tag }}"
        # --- Workspace version updates (see values.yaml `controller.update`) ---
        # Repo whose GitHub Releases define "latest"; tag_name vX.Y.Z maps to
        # the devlaptop-vX.Y.Z image. Drives the dashboard's update badge.
        - name: RELEASE_REPO
          value: {{ .Values.controller.update.releaseRepo | quote }}
        {{- if .Values.controller.update.selfServeSecretName }}
        # Self-serve: a workspace's own backend brokers an update for ITS OWN
        # workspace via the token-gated listener on SELF_SERVE_PORT (a separate
        # port from the admin API — see networkpolicy.yaml for why).
        - name: SELF_SERVE_PORT
          value: "8081"
        - name: SELF_SERVE_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.controller.update.selfServeSecretName }}
              key: self-serve-token
        # Whether workspaces still holding the pre-derivation shared master
        # token are accepted (migration mode; each such request is logged).
        # Flip controller.update.allowSharedToken to false once every
        # workspace namespace carries its derived per-workspace token.
        - name: SELF_SERVE_ALLOW_SHARED_TOKEN
          value: {{ if hasKey .Values.controller.update "allowSharedToken" }}{{ .Values.controller.update.allowSharedToken | quote }}{{ else }}"true"{{ end }}
        {{- end }}
        {{- if .Values.controller.adminToken.enabled }}
        # Persistent admin API token for non-browser clients (the Expo mobile
        # app), which can't complete the oauth2 handshake. Mounted from a Secret
        # exactly like SELF_SERVE_TOKEN — never a plaintext env literal. Reveal
        # it from the web console's "Mobile access" card. See admin-token-secret.yaml.
        - name: CONTROLLER_ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.controller.adminToken.existingSecretName | default "workspace-controller-admin-token" }}
              key: admin-token
        {{- end }}
        {{- if .Values.provision.enabled }}
        # --- Self-service provisioning (see values.yaml `provision`) ---
        # The admin creates a GitHub OAuth App by hand and pastes its Client ID +
        # Secret per workspace; the controller only needs the GitOps push token.
        - name: WORKSPACE_DOMAIN
          value: {{ required "provision.workspaceDomain is required when provision.enabled" .Values.provision.workspaceDomain | quote }}
        - name: GITOPS_REPO
          value: {{ required "provision.gitops.repo is required when provision.enabled" .Values.provision.gitops.repo | quote }}
        - name: GITOPS_BRANCH
          value: {{ .Values.provision.gitops.branch | quote }}
        - name: CHART_REPO
          value: {{ .Values.provision.chart.repo | quote }}
        - name: CHART_REF
          value: {{ .Values.provision.chart.ref | quote }}
        - name: PROVISIONER_SERVICE_ACCOUNT
          value: {{ .Values.provision.serviceAccount | quote }}
        - name: PROVISIONER_PULL_SECRET
          value: {{ .Values.controller.image.pullSecretName | quote }}
        - name: WORKSPACE_IMAGE_TAG
          value: {{ .Values.provision.workspaceImageTag | quote }}
        # Shared cluster Secrets projected into each provisioned workspace so the
        # console path matches a hand-scaffolded one (self-serve updates + shared
        # OpenRouter). Blank => that feature stays off.
        - name: WORKSPACE_SELF_SERVE_SECRET
          value: {{ .Values.provision.workspaceSelfServeSecret | quote }}
        - name: WORKSPACE_ASSISTANT_SECRET
          value: {{ .Values.provision.workspaceAssistantSecret | quote }}
        {{- if .Values.provision.image }}
        - name: PROVISIONER_IMAGE
          value: {{ .Values.provision.image | quote }}
        {{- end }}
        # Runtime credential: the git push token, from the chart-rendered Secret
        # (see provisioner-secret.yaml) or provision.existingSecretName if set.
        {{- $provSecret := .Values.provision.existingSecretName | default "workspace-controller-provision" }}
        - name: GITOPS_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ $provSecret }}
              key: git-token
        {{- end }}
        ports:
        - name: http
          containerPort: 8080
        {{- if .Values.controller.update.selfServeSecretName }}
        - name: self-serve
          containerPort: 8081
        {{- end }}
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /livez
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        volumeMounts:
        - name: controller-app
          mountPath: /controller
        - name: controller-web
          mountPath: /controller-web
        - name: home
          mountPath: /home/controller
        - name: tmp
          mountPath: /tmp
        resources:
{{ toYaml .Values.controller.resources | indent 10 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
      volumes:
      - name: controller-app
        configMap:
          name: workspace-controller-app
          defaultMode: 0444
      - name: controller-web
        configMap:
          name: workspace-controller-web
          defaultMode: 0444
      - name: home
        emptyDir: {}
      - name: tmp
        emptyDir: {}
