apiVersion: v1
kind: Secret
metadata:
  name: workspace-controller-oauth2
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
type: Opaque
stringData:
  cookie-secret: {{ required "oauth2.cookieSecret is required" .Values.oauth2.cookieSecret | quote }}
  client-id: {{ required "oauth2.clientId is required" .Values.oauth2.clientId | quote }}
  client-secret: {{ required "oauth2.clientSecret is required" .Values.oauth2.clientSecret | quote }}
---
# oauth2-proxy runs as a REVERSE PROXY here (not just the external-auth
# sidecar the workspace chart uses): the single ingress sends every path to
# it, it authenticates against GitHub, and forwards authed requests to the
# controller via --upstream. Its own /oauth2/* endpoints (start, callback,
# auth) are served directly. One ingress, one backend — simpler than the
# workspace's multi-port external-auth setup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workspace-controller-oauth2
  namespace: {{ .Values.namespace }}
  labels:
    app: workspace-controller-oauth2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workspace-controller-oauth2
  template:
    metadata:
      labels:
        app: workspace-controller-oauth2
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.0
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        args:
        - --provider=github
        - --email-domain=*
        - --upstream=http://workspace-controller:8080/
        - --http-address=0.0.0.0:4180
        - --reverse-proxy=true
        - --cookie-secure=true
        - --cookie-domain={{ .Values.controller.host }}
        - --cookie-path=/
        - --cookie-expire=24h0m0s
        - --cookie-refresh=1h0m0s
        - --whitelist-domain={{ .Values.controller.host }}
        - --redirect-url=https://{{ .Values.controller.host }}/oauth2/callback
        {{- if .Values.oauth2.githubUsers }}
        - --github-user={{ .Values.oauth2.githubUsers }}
        {{- end }}
        {{- if .Values.oauth2.githubOrg }}
        - --github-org={{ .Values.oauth2.githubOrg }}
        {{- end }}
        {{- if .Values.oauth2.githubTeam }}
        - --github-team={{ .Values.oauth2.githubTeam }}
        {{- end }}
        - --skip-provider-button=false
        - --pass-access-token=true
        - --pass-user-headers=true
        - --set-xauthrequest=true
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: workspace-controller-oauth2
              key: client-id
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: workspace-controller-oauth2
              key: client-secret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: workspace-controller-oauth2
              key: cookie-secret
        ports:
        - containerPort: 4180
          name: http
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: workspace-controller-oauth2
  namespace: {{ .Values.namespace }}
  labels:
    app: workspace-controller-oauth2
spec:
  selector:
    app: workspace-controller-oauth2
  ports:
  - port: 4180
    targetPort: 4180
    name: http
