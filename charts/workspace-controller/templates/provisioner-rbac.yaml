{{- if .Values.provision.enabled }}
# The privileged half of provisioning. A dedicated ServiceAccount the
# short-lived provisioner Job runs as — it holds every create/update/delete the
# `workspace` chart needs to `helm upgrade --install` a new workspace. The
# always-on, internet-facing controller pod NEVER gets these verbs; it only
# `create`s a Job (see serviceaccount.yaml) that assumes this identity, so the
# blast radius of a controller compromise stays "can start Jobs", not "can
# rewrite every tenant's Deployment + read every Secret".
#
# Cluster-scoped under per-workspace namespaces (#103): standing up a new
# tenant now means CREATING its `ws-<user>` Namespace and stamping the workspace
# objects (Deployment, Secrets, quota, RBAC, the regcred image-pull Secret)
# into it. Namespace creation is inherently cluster-scoped, and RBAC cannot
# scope `create` to a namespace that does not exist yet — so this identity is a
# ClusterRole/ClusterRoleBinding. The mitigations that keep this acceptable:
#   * it belongs to a short-lived Job, not the always-on controller;
#   * the controller can only *launch* that Job (namespaced `create jobs`),
#     never assume its verbs directly;
#   * provisioning is opt-in (provision.enabled) and off by default.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.provision.serviceAccount }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.provision.serviceAccount }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
rules:
# Create + label the per-workspace Namespace itself. `delete` supports the
# migration/decommission runbook (tearing a tenant's namespace back down).
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# The workspace Deployment + its oauth2-proxy Deployment, plus scale subresource
# (helm's --wait reads rollout status).
- apiGroups: ["apps"]
  resources: ["deployments", "deployments/scale", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Service, PVC, ConfigMaps, the per-user Secrets the chart renders (incl. the
# regcred image-pull Secret copied into each new namespace), and the Helm
# release-state Secret (Helm 3 stores releases as Secrets in the namespace).
- apiGroups: [""]
  resources: ["services", "persistentvolumeclaims", "configmaps", "secrets", "serviceaccounts"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Per-namespace ResourceQuota + LimitRange the workspace chart renders (#103/#95).
- apiGroups: [""]
  resources: ["resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Ingresses for the workspace host + oauth2 routes, plus the per-workspace
# NetworkPolicy the chart always renders (denies cross-tenant ingress to the pods).
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# The oauth2-proxy PodDisruptionBudget the chart ships for its HA proxy pair.
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# The workspace chart ships its own per-user build Role/RoleBinding AND the
# controller RoleBinding (controller-rbac.yaml); Helm must be able to create
# them. (RBAC create is itself privileged — it lives only here.)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Kubernetes privilege-escalation prevention: to *create* the per-user build Role
# (which grants batch jobs/cronjobs for Triggers), the provisioner must itself
# hold a superset of those verbs. Its other rules already cover the build Role's
# secrets + pods grants; batch is the only addition needed.
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Read pods so `helm --wait` and any troubleshooting can observe rollout.
- apiGroups: [""]
  resources: ["pods", "pods/log", "events"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.provision.serviceAccount }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.provision.serviceAccount }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.provision.serviceAccount }}
  namespace: {{ .Values.namespace }}
{{- end }}
