apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
---
# Namespace-scoped, NOT a ClusterRole. The controller only ever lists/scales
# workspaces in its own namespace, so it never needs cluster-wide reach. On
# this shared DOKS cluster (~20+ unrelated tenants) a ClusterRole carrying
# `deployments/scale` would be a cross-tenant kill switch — the same reasoning
# the workspace chart codified for its build Role
# (charts/workspace/templates/serviceaccount.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
rules:
# List workspaces and read their replica/rollout status.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
# Start/stop. `deployments/scale` is a SEPARATE RBAC object — `kubectl scale`
# GETs then UPDATE/PATCHes it. Granting only `deployments` lets the console
# list workspaces but every Stop/Start would 403. This is the rule to get right.
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["get", "update", "patch"]
# Edit a workspace's CPU/memory limits in place (strategic-merge patch on the
# ide container). `patch` on the deployment itself is broader than scale — it's
# whole-object edit, since RBAC can't scope to a single field — but it's the
# minimum the in-place limit editor needs and stays namespaced to this admin
# console. Remove this verb to disable limit editing.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
# Read pod status so the UI can tell "starting" from "CrashLoopBackOff".
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Read PVC sizes for disk %-used and the storage-cost estimate / insights.
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list"]
# Read each workspace's ingress host for a clickable link. Optional — the
# listing degrades gracefully (no URL) if this is removed.
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list"]
{{- if .Values.provision.enabled }}
# PROVISIONING ONLY. The controller launches and polls the privileged
# provisioner Job; it never gains create/delete on deployments/secrets itself —
# that power lives solely on the provisioner's own Role below. `create` is the
# new capability; `get/list/watch` let the UI poll Job status.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create"]
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workspace-controller
subjects:
- kind: ServiceAccount
  name: workspace-controller
  namespace: {{ .Values.namespace }}
