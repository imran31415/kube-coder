apiVersion: v1
kind: ServiceAccount
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
---
# workspace-controller ClusterRole — the workspace-management verb set.
#
# Under per-workspace namespaces (#103) each workspace lives in its OWN
# `ws-<user>` namespace, so the controller must reach across namespaces to
# list/scale/patch them. It does NOT get those verbs cluster-wide: this
# ClusterRole is only a *definition*. It is granted one namespace at a time —
#   * by each workspace chart's controller-rbac.yaml RoleBinding (in ws-<user>), and
#   * by the RoleBinding below in the controller's own namespace.
# A RoleBinding that references a ClusterRole confines those verbs to the
# binding's namespace, so `deployments/scale` never becomes the cluster-wide
# "kill switch" the old namespaced Role comment warned about — mutate power is
# handed out per tenant, by the tenant's own chart.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workspace-controller
  labels:
    {{- include "wc.labels" . | nindent 4 }}
rules:
# List workspaces and read their replica/rollout status.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
# Start/stop. `deployments/scale` is a SEPARATE RBAC object — `kubectl scale`
# GETs then UPDATE/PATCHes it. Granting only `deployments` lets the console
# list workspaces but every Stop/Start would 403. This is the rule to get right.
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["get", "update", "patch"]
# Edit a workspace's CPU/memory limits in place (strategic-merge patch on the
# ide container). `patch` on the deployment itself is broader than scale — it's
# whole-object edit, since RBAC can't scope to a single field — but it's the
# minimum the in-place limit editor needs and, via the per-namespace binding,
# stays confined to a single tenant's namespace.
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
# Read pod status so the UI can tell "starting" from "CrashLoopBackOff".
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Read PVC sizes for disk %-used and the storage-cost estimate / insights.
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list"]
# Read each workspace's ingress host for a clickable link. Optional — the
# listing degrades gracefully (no URL) if this is removed.
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list"]
---
# Discovery ClusterRole — read-only `namespaces` list/get, bound cluster-wide.
#
# With workspaces spread across per-user namespaces, the controller enumerates
# them by listing namespaces and filtering to the `ws-<user>` name convention
# (WORKSPACE_PREFIX), then queries each one via the per-namespace grant above.
# Listing namespace names/labels is read-only and carries no ability to read
# their contents — this is the ONLY cluster-wide binding the controller holds.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: workspace-controller-discovery
  labels:
    {{- include "wc.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: workspace-controller-discovery
  labels:
    {{- include "wc.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workspace-controller-discovery
subjects:
- kind: ServiceAccount
  name: workspace-controller
  namespace: {{ .Values.namespace }}
---
# Grant the workspace-management verbs within the controller's OWN namespace.
# Covers any workspace still resident here (e.g. mid-migration) and is
# equivalent to the pre-#103 namespaced Role — no cluster-wide reach.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-controller
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: workspace-controller
subjects:
- kind: ServiceAccount
  name: workspace-controller
  namespace: {{ .Values.namespace }}
{{- if .Values.provision.enabled }}
---
# PROVISIONING ONLY, and deliberately namespace-local. The controller launches
# and polls the privileged provisioner Job in its OWN namespace; the Job (not
# the controller) holds the cluster-scoped create verbs. `create` is the new
# capability; `get/list/watch` let the UI poll Job status. Keeping this a
# namespaced Role means a controller compromise cannot grant itself RBAC or act
# cluster-wide directly.
#
# CAVEAT — do not read this as "a controller compromise can only start Jobs".
# The Jobs it starts run AS the workspace-provisioner SA (provisioner-rbac.yaml),
# and creating a Job that selects another namespace-local SA bridges to that SA's
# ClusterRole (security review July 2026, finding 4). That escalation path is
# constrained — not eliminated — by the ValidatingAdmissionPolicy in
# provisioner-vap.yaml, which pins the shape of provisioner-SA Jobs.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workspace-controller-provision
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: workspace-controller-provision
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "wc.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: workspace-controller-provision
subjects:
- kind: ServiceAccount
  name: workspace-controller
  namespace: {{ .Values.namespace }}
{{- end }}
