# workspace-controller — admin console that lists every workspace in the
# namespace and lets an operator start/stop any of them. Single in-cluster
# Deployment, gated by oauth2-proxy to an admin GitHub-user allowlist.
#
# This chart is deployed ONCE per namespace (like base-infrastructure), not
# per user. Resolve values from a gitignored dir (users-private/_controller/)
# — see `make deploy-controller`.

namespace: coder

controller:
  # DNS hostname the console is served at, e.g. controller.dev.example.io.
  # REQUIRED. cert-manager won't issue TLS until this resolves to the cluster.
  host: ""

  # The same image the workspaces run (python3 + kubectl already inside). The
  # Makefile overrides the tag via --set so the controller tracks the built
  # image; this default is only a fallback for raw `helm install`.
  image:
    repository: registry.digitalocean.com/resourceloop/coder
    tag: devlaptop-v1.11.0-claude-ante-updates
    pullPolicy: IfNotPresent
    pullSecretName: regcred

  # A workspace is any Deployment whose name starts with this prefix. The
  # username shown in the UI is the name minus the prefix. Mirrors the
  # ws-<user> convention used by the workspace chart.
  workspacePrefix: "ws-"

  # Defense-in-depth on top of the oauth2-proxy gate: if set (comma-separated
  # GitHub usernames), controller.py also checks X-Auth-Request-User against
  # this list. Leave empty to trust the oauth2-proxy --github-user gate alone.
  adminUsers: ""

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Per-workspace usage metrics come from the in-cluster Prometheus (this
  # cluster has no metrics-server). Empty disables the metrics panel cleanly.
  metrics:
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.default.svc:9090
    # Rough, operator-tunable cost model shown in the mini dashboard. Compute
    # is estimated from observed CPU/memory usage; storage from PVC size.
    # Defaults from DigitalOcean Basic droplet pricing ($12/mo per 1 vCPU + 2 GB,
    # split 50/50 => ~$0.0082/core-hr, ~$0.0041/GB-hr) + $0.10/GB-mo block storage.
    cost:
      cpuCoreHour: "0.0082"
      memGbHour: "0.0041"
      storageGbMonth: "0.10"

ingress:
  className: nginx
  tls:
    enabled: true
    # REQUIRED when tls.enabled — cert-manager writes the issued cert here.
    secretName: ""
    clusterIssuer: letsencrypt-production

# Dedicated GitHub OAuth App for the controller host (a workspace's app can't
# be reused — the callback URL must match this host). REQUIRED.
oauth2:
  cookieSecret: ""   # 32 chars: openssl rand -base64 64 | tr -d '\n=+/' | head -c 32
  clientId: ""
  clientSecret: ""
  # THE access gate — comma-separated GitHub usernames allowed to sign in.
  githubUsers: ""
  githubOrg: ""
  githubTeam: ""

# Self-service provisioning: an admin types a GitHub username in the console and
# the controller (1) registers a GitHub App for them via the manifest flow, (2)
# pushes rendered values+secrets to a private GitOps repo, and (3) launches a
# privileged Job that `helm upgrade`s the workspace. OFF by default — the
# controller stays a least-privileged list/scale console until you opt in and
# supply every field below.
provision:
  enabled: false

  # Base domain new workspaces are created under: <login>.<workspaceDomain>.
  # Requires wildcard DNS (*.<workspaceDomain>) pointing at the ingress.
  workspaceDomain: ""              # e.g. dev.scalebase.io

  # Create the per-user GitHub Apps under this org. Empty => the signed-in
  # admin's personal account. The admin must be able to create apps there.
  githubOrg: ""

  # Private repo (host/path, no scheme) holding generated users-private/<u>/
  # values + secrets. The controller pushes here; the Job clones it.
  gitops:
    repo: ""                       # e.g. github.com/imran31415/kube-coder-users.git
    branch: main

  # Repo + ref the provisioner Job pulls the workspace Helm chart from. Point
  # these at YOUR fork if you've customised the workspace chart.
  chart:
    repo: https://github.com/imran31415/kube-coder.git
    ref: main

  # Runtime credentials. Put these in users-private/_controller/secrets/provision.yaml
  # (gitignored) — the chart renders them into a Secret, the same way oauth2
  # credentials flow. `scripts/setup-controller-provisioning.sh` scaffolds this
  # file and generates stateSecret for you.
  gitToken: ""                     # token with push to gitops.repo + GitHub API read
  stateSecret: ""                  # random HMAC key signing the manifest-flow state param

  # Optional: reference a pre-existing Secret (keys: git-token, state-secret)
  # instead of having the chart create one from gitToken/stateSecret above —
  # e.g. if you manage it with sealed-secrets/SOPS.
  existingSecretName: ""

  # ServiceAccount the privileged Job runs as (created by provisioner-rbac.yaml).
  serviceAccount: workspace-provisioner

  # Image the Job runs. Empty => the controller image (has kubectl/git/make/curl;
  # installs helm on the fly). Override only if you bake a dedicated tool image.
  image: ""

  # Default tag new workspaces run; the chart prefixes it with `devlaptop-`.
  workspaceImageTag: ""
