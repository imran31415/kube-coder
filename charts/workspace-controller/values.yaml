# workspace-controller — admin console that lists every workspace in the
# namespace and lets an operator start/stop any of them. Single in-cluster
# Deployment, gated by oauth2-proxy to an admin GitHub-user allowlist.
#
# This chart is deployed ONCE per namespace (like base-infrastructure), not
# per user. Resolve values from a gitignored dir (users-private/_controller/)
# — see `make deploy-controller`.

namespace: coder

controller:
  # DNS hostname the console is served at, e.g. controller.dev.example.io.
  # REQUIRED. cert-manager won't issue TLS until this resolves to the cluster.
  host: ""

  # The same image the workspaces run (python3 + kubectl already inside). The
  # Makefile overrides the tag via --set so the controller tracks the built
  # image; this default is only a fallback for raw `helm install`.
  image:
    repository: registry.digitalocean.com/resourceloop/coder
    tag: devlaptop-v1.11.0-claude-ante-updates
    pullPolicy: IfNotPresent
    pullSecretName: regcred

  # A workspace is any Deployment whose name starts with this prefix. The
  # username shown in the UI is the name minus the prefix. Mirrors the
  # ws-<user> convention used by the workspace chart.
  workspacePrefix: "ws-"

  # Defense-in-depth on top of the oauth2-proxy gate: if set (comma-separated
  # GitHub usernames), controller.py also checks X-Auth-Request-User against
  # this list. Leave empty to trust the oauth2-proxy --github-user gate alone.
  adminUsers: ""

  # Persistent admin API token so non-browser clients — the Expo mobile app —
  # can reach the admin API with `Authorization: Bearer <token>` (oauth2-proxy
  # can't do a mobile OAuth handshake). OFF by default: the token bypasses the
  # proxy gate and the adminUsers allowlist, so enable it deliberately. When
  # enabled, a strong token is auto-generated into a Secret and PRESERVED across
  # upgrades — reveal it from the web console's "Mobile access" card, then paste
  # the controller host + token into the app. Rotate by deleting the Secret (or
  # setting `value`) and restarting the controller.
  adminToken:
    enabled: false
    # Pin a specific token instead of auto-generating (e.g. from a secrets
    # overlay). Empty => generate + preserve across upgrades.
    value: ""
    # Bring your own Secret (must expose an `admin-token` key), e.g. one managed
    # by sealed-secrets/SOPS. When set, the chart does not create its own Secret.
    existingSecretName: ""

  # Workspace version updates: surface "update available" per workspace and let
  # a confirmed action restart it onto the latest release image. The live
  # Deployment is patched immediately; when provisioning's GitOps repo is
  # configured the new tag is also committed to the user's values.yaml so it
  # survives the next reconcile.
  update:
    # Repo whose GitHub Releases define "latest". Its release tag (vX.Y.Z) maps
    # to the workspace image tag devlaptop-vX.Y.Z.
    releaseRepo: "imran31415/kube-coder"
    # Opt-in end-user self-serve: lets a user update their OWN workspace from
    # the per-workspace dashboard (brokered by the workspace backend over a
    # token-gated, separate controller port — never the admin API). Create one
    # Secret in the namespace with key `self-serve-token`, then name it here AND
    # in the workspace chart's `update.selfServeSecretName`. Empty (default) =>
    # self-serve off; admins still update any workspace from this dashboard.
    selfServeSecretName: ""

  # The controller buffers Prometheus range-query results in memory (capacity
  # history + per-workspace insights over hours) across concurrent request
  # threads. The /api/workspaces listing is now deployments-only + single-flight
  # cached (no all-namespace pod/ingress JSON, no stacking polls), which removed
  # the main OOM driver; the limit keeps headroom for the Prometheus buffers and
  # concurrent metric requests. (256Mi OOM-killed it historically; 512Mi still
  # OOM'd under the old heavy-listing + 5s-poll load.)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 768Mi

  # Per-workspace usage metrics come from the in-cluster Prometheus (this
  # cluster has no metrics-server). Empty disables the metrics panel cleanly.
  metrics:
    prometheusUrl: http://prometheus-kube-prometheus-prometheus.default.svc:9090
    # Rough, operator-tunable cost model shown in the mini dashboard. Compute
    # is estimated from observed CPU/memory usage; storage from PVC size.
    # Defaults from DigitalOcean Basic droplet pricing ($12/mo per 1 vCPU + 2 GB,
    # split 50/50 => ~$0.0082/core-hr, ~$0.0041/GB-hr) + $0.10/GB-mo block storage.
    cost:
      cpuCoreHour: "0.0082"
      memGbHour: "0.0041"
      storageGbMonth: "0.10"

ingress:
  className: nginx
  tls:
    enabled: true
    # REQUIRED when tls.enabled — cert-manager writes the issued cert here.
    secretName: ""
    clusterIssuer: letsencrypt-production

# Dedicated GitHub OAuth App for the controller host (a workspace's app can't
# be reused — the callback URL must match this host). REQUIRED.
oauth2:
  cookieSecret: ""   # 32 chars: openssl rand -base64 64 | tr -d '\n=+/' | head -c 32
  clientId: ""
  clientSecret: ""
  # THE access gate — comma-separated GitHub usernames allowed to sign in.
  githubUsers: ""
  githubOrg: ""
  githubTeam: ""

# Self-service provisioning: an admin types a GitHub username in the console and
# the controller (1) registers a GitHub App for them via the manifest flow, (2)
# pushes rendered values+secrets to a private GitOps repo, and (3) launches a
# privileged Job that `helm upgrade`s the workspace. OFF by default — the
# controller stays a least-privileged list/scale console until you opt in and
# supply every field below.
provision:
  enabled: false

  # Base domain new workspaces are created under: <login>.<workspaceDomain>.
  # Requires wildcard DNS (*.<workspaceDomain>) pointing at the ingress.
  #
  # Per workspace the admin creates a GitHub *OAuth App* by hand (Settings →
  # Developer settings → OAuth Apps, callback https://<login>.<domain>/oauth2/
  # callback) and pastes its Client ID + Secret into the console — there is no
  # API to create classic OAuth Apps, and a GitHub App's creds 404 oauth2-proxy.
  workspaceDomain: ""              # e.g. dev.scalebase.io

  # Private repo (host/path, no scheme) holding generated users-private/<u>/
  # values + secrets. The controller pushes here; the Job clones it.
  gitops:
    repo: ""                       # e.g. github.com/imran31415/kube-coder-users.git
    branch: main

  # Repo + ref the provisioner Job pulls the workspace Helm chart from. Point
  # these at YOUR fork if you've customised the workspace chart.
  chart:
    repo: https://github.com/imran31415/kube-coder.git
    ref: main

  # Runtime credential. Put this in users-private/_controller/secrets/provision.yaml
  # (gitignored) — the chart renders it into a Secret, the same way oauth2
  # credentials flow.
  gitToken: ""                     # token with push to gitops.repo + GitHub API read

  # Optional: reference a pre-existing Secret (key: git-token) instead of having
  # the chart create one from gitToken above — e.g. if you manage it with
  # sealed-secrets/SOPS.
  existingSecretName: ""

  # ServiceAccount the privileged Job runs as (created by provisioner-rbac.yaml).
  serviceAccount: workspace-provisioner

  # Image the Job runs. Empty => the controller image (has kubectl/git/make/curl;
  # installs helm on the fly). Override only if you bake a dedicated tool image.
  image: ""

  # Fallback image tag for new workspaces (chart prefixes it with `devlaptop-`).
  # New workspaces default to the latest published release; this is used only
  # when that release lookup is unavailable (e.g. GitHub unreachable). Leave
  # empty unless you need a specific offline fallback.
  workspaceImageTag: ""

  # Shared cluster Secret names projected into every provisioned workspace so the
  # console path matches a hand-scaffolded one. Blank => that feature stays off.
  workspaceSelfServeSecret: ""     # self-serve update token (== update.selfServeSecretName)
  workspaceAssistantSecret: ""     # shared OpenRouter key (== assistant.openrouter.sharedSecretName)
