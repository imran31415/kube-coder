name: CI

# Run on every PR / push to main. The previous `paths: charts/**` filter
# skipped CI entirely on changes under charts/workspace/web/ (the SPA),
# letting frontend regressions ship green. The per-job step list is fast
# enough (~3 min total) that running unconditionally is the right default.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint base-infrastructure chart
        run: helm lint charts/base-infrastructure/

      - name: Lint workspace chart
        run: helm lint charts/workspace/ -f charts/workspace/tests/test-values.yaml

      - name: Template workspace chart (basic auth)
        run: helm template test-ws charts/workspace/ -f charts/workspace/tests/test-values.yaml > /dev/null

      - name: Template workspace chart (oauth2 auth)
        run: |
          helm template test-ws charts/workspace/ \
            -f charts/workspace/tests/test-values.yaml \
            --set ingress.auth.type=oauth2 \
            --set oauth2.githubUsers=testuser \
            --set oauth2.cookieSecret=test-secret \
            --set oauth2.clientId=test-id \
            --set oauth2.clientSecret=test-secret \
            > /dev/null

      - name: Lint workspace-controller chart
        run: helm lint charts/workspace-controller/ -f charts/workspace-controller/tests/test-values.yaml

      - name: Template workspace-controller chart
        run: helm template test-wc charts/workspace-controller/ -f charts/workspace-controller/tests/test-values.yaml > /dev/null

  helm-test:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.5.2

      - name: Run unit tests (workspace)
        run: helm unittest charts/workspace/

      - name: Run unit tests (workspace-controller)
        run: helm unittest charts/workspace-controller/

  python-tests:
    name: Server.py Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run server.py tests
        run: make python-tests

  web-tests:
    name: Dashboard SPA Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: charts/workspace/web/yarn.lock

      - name: Install SPA deps
        run: yarn --cwd charts/workspace/web install --frozen-lockfile

      - name: Type-check + build
        run: yarn --cwd charts/workspace/web build

      - name: Vitest
        run: yarn --cwd charts/workspace/web test

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devlaptop/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: kube-coder:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build the runtime stage (no push). This still compiles the SPA
          # (runtime COPYs from the dashboard-builder stage, so a tsc/build
          # break fails here) and runs every install command — Ante, Claude
          # Code, OpenCode, ttyd — catching Dockerfile/dependency regressions
          # before deploy.
          target: runtime
