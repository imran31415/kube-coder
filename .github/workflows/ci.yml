name: CI

# Run on every PR / push to main. The previous `paths: charts/**` filter
# skipped CI entirely on changes under charts/workspace/web/ (the SPA),
# letting frontend regressions ship green. The per-job step list is fast
# enough (~3 min total) that running unconditionally is the right default.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to a read-only token for every job. The security-scan job widens
# this to upload SARIF (see its own permissions block). Without an explicit
# block the workflow inherited the repo's read-only default, so the
# upload-sarif step failed on pushes to main with "Resource not accessible
# by integration" (PR runs happened to get a writable token and passed).
permissions:
  contents: read

jobs:
  helm-lint:
    name: Helm Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.21.3

      - name: Lint base-infrastructure chart
        run: helm lint charts/base-infrastructure/

      - name: Lint workspace chart
        run: helm lint charts/workspace/ -f charts/workspace/tests/test-values.yaml

      - name: Template workspace chart (basic auth)
        run: helm template test-ws charts/workspace/ -f charts/workspace/tests/test-values.yaml > /dev/null

      - name: Template workspace chart (oauth2 auth)
        run: |
          helm template test-ws charts/workspace/ \
            -f charts/workspace/tests/test-values.yaml \
            --set ingress.auth.type=oauth2 \
            --set oauth2.githubUsers=testuser \
            --set oauth2.cookieSecret=test-secret \
            --set oauth2.clientId=test-id \
            --set oauth2.clientSecret=test-secret \
            > /dev/null

      - name: Lint workspace-controller chart
        run: helm lint charts/workspace-controller/ -f charts/workspace-controller/tests/test-values.yaml

      - name: Template workspace-controller chart
        run: helm template test-wc charts/workspace-controller/ -f charts/workspace-controller/tests/test-values.yaml > /dev/null

  helm-test:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.21.3

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.5.2

      - name: Run unit tests (workspace)
        run: helm unittest charts/workspace/

      - name: Run unit tests (workspace-controller)
        run: helm unittest charts/workspace-controller/

  python-tests:
    name: Server.py Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.14'

      - name: Run server.py tests
        run: make python-tests

  web-tests:
    name: Dashboard SPA Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: charts/workspace/web/yarn.lock

      - name: Install SPA deps
        run: yarn --cwd charts/workspace/web install --frozen-lockfile

      - name: Type-check + build
        run: yarn --cwd charts/workspace/web build

      - name: Vitest
        run: yarn --cwd charts/workspace/web test

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: devlaptop/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: kube-coder:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build the runtime stage (no push). This still compiles the SPA
          # (runtime COPYs from the dashboard-builder stage, so a tsc/build
          # break fails here) and runs every install command — Ante, Claude
          # Code, OpenCode, ttyd — catching Dockerfile/dependency regressions
          # before deploy.
          target: runtime

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: docker-build  # Wait for docker-build to complete
    permissions:
      contents: read          # checkout + trufflehog
      security-events: write  # upload-sarif -> GitHub code scanning
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@4ecd7d56fdb6eb5ce957cfe92b5dd5f5052b5257 # main
        with:
          extra_args: --only-verified

      - name: Set up Docker
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Docker image for scanning
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: devlaptop/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: kube-coder-ci:latest
          target: runtime

      - name: Docker Image Vulnerability Scanning
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8 # master
        with:
          image-ref: 'kube-coder-ci:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          scanners: 'vuln'
          # Drop findings with no upstream fix: kernel-header CVEs
          # (linux-libc-dev) don't apply to a container — it ships headers for
          # cgo, not a running kernel — and unfixed CVEs aren't actionable in
          # CI. Also auto-handles future no-fix kernel CVEs without churn.
          ignore-unfixed: true
          # .trivyignore lists code-server false positives (Trivy misreads the
          # bundled VS Code version as the code-server version). See the file.
          trivyignores: '.trivyignore'

      - name: Upload Trivy Scan Results
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        # Upload whenever the SARIF exists, even if an earlier step failed —
        # but skip (don't error) when it's absent, e.g. the image build or
        # Trivy itself failed and produced no report. `always()` alone made
        # the step fail with "Path does not exist: trivy-results.sarif",
        # masking the real upstream failure.
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM (Syft)
        # SPDX-JSON software bill of materials for the built image, uploaded as
        # a CI artifact. Runs regardless of the scan result so the SBOM is
        # always available for triage.
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: success() || failure()
        with:
          image: kube-coder-ci:latest
          format: spdx-json
          output-file: kube-coder-sbom.spdx.json
          artifact-name: kube-coder-sbom.spdx.json

      - name: SCA Scanning (SPA dependencies)
        # yarn-classic advisories via audit-ci (blocking). Gates on high+
        # severity; the per-package audit-ci.jsonc allowlist covers dev/build-
        # time advisories that don't ship in the runtime image (tracked for
        # upgrade by Renovate). See docs/SUPPLY_CHAIN.md.
        if: success() || failure()
        run: |
          set -euo pipefail
          for dir in charts/workspace/web charts/workspace-controller/web; do
            echo "::group::audit-ci ${dir}"
            (cd "${dir}" && npx --yes audit-ci@^7 --config audit-ci.jsonc)
            echo "::endgroup::"
          done

      - name: SCA Scanning (Python dependencies)
        # pip-audit (PyPA, OSV-backed, no account required) over the pinned
        # runtime deps (blocking). Replaces the former `safety check`, which
        # scanned only the runner's own install — the app is stdlib-only apart
        # from these. Allowlist unfixable advisories with `--ignore-vuln <ID>`.
        if: success() || failure()
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r devlaptop/requirements.txt --desc
